function LoginScreen({ onLogin, sysUsers }) {
  const [username, setUsername] = React.useState("");

              style={{ width:"100%", padding:"10px 12px", border:"1.5px solid #ddd", borderRadius:8, fontSize:14, boxSizing:"border-box" }} />
          </div>
          <div>
            <label style={{ fontSize:12, fontWeight:700, color:"#555", display:"block", marginBottom:5 }}>Mật khẩu</label>
            <div style={{ position:"relative" }}>
              <input type={showPw?"text":"password"} value={password} onChange={e=>setPassword(e.target.value)} placeholder="Nhập mật khẩu"
                onKeyDown={e=>e.key==="Enter"&&handleLogin()}

  if (days === null) return "";

};

const printQuote = (q, data) => {
  const c = data.customers.find(c => c.id === q.customerId);
  const v = data.vehicles.find(v => v.id === q.vehicleId);
  const calcQI2 = (it) => it.type === "labor"
    ? { rev: Number(it.hours) * Number(it.laborRate), cost: 0 }

      }
      return s.trim();
    };
    const ty=Math.floor(n/1000000000), tr=Math.floor((n%1000000000)/1000000);
    const ng=Math.floor((n%1000000)/1000), dn=n%1000;

const useStorage = () => {
  const [data, setData] = useState(() => {
    try {
      const saved = sessionStorage.getItem("sico_auto");
      if (saved) return JSON.parse(saved);
    } catch {}
    return DEFAULT_GARAGE_DATA();
  });
  // "idle" | "loading" | "synced" | "saving" | "error"
  const [syncStatus, setSyncStatus] = useState("idle");
  const [syncError, setSyncError] = useState("");
  const saveTimerRef = React.useRef(null);
  const hasLoadedRemoteRef = React.useRef(false);

  // Tải dữ liệu từ Google Sheet ngay khi mở app (1 lần)
  React.useEffect(() => {
    if (!SHEETS_API_URL) return;
    setSyncStatus("loading");
    fetch(`${SHEETS_API_URL}?action=get`)
      .then(r => r.json())
      .then(res => {
        if (res && res.ok && res.data && Object.keys(res.data).length > 0) {
          setData(res.data);
          try { sessionStorage.setItem("sico_auto", JSON.stringify(res.data)); } catch {}
        }
        hasLoadedRemoteRef.current = true;
        setSyncStatus("synced");
        setSyncError("");
      })
      .catch(err => {
        hasLoadedRemoteRef.current = true;
        setSyncStatus("error");
        setSyncError("Không tải được dữ liệu từ Google Sheet — đang dùng dữ liệu cục bộ trên máy này. " + (err?.message || ""));
      });
  }, []);

  // Đẩy dữ liệu lên Google Sheet, debounce 1.2s để tránh gọi liên tục khi gõ nhanh
  const pushToSheet = useCallback((newData) => {
    if (!SHEETS_API_URL || !hasLoadedRemoteRef.current) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(() => {
      setSyncStatus("saving");
      fetch(SHEETS_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" }, // tránh preflight CORS, Apps Script vẫn đọc được qua e.postData
        body: JSON.stringify({ action: "set", data: newData }),
      })
        .then(r => r.json())
        .then(res => {
          if (res && res.ok) { setSyncStatus("synced"); setSyncError(""); }
          else { setSyncStatus("error"); setSyncError(res?.error || "Lưu lên Google Sheet thất bại"); }
        })
        .catch(err => { setSyncStatus("error"); setSyncError("Không kết nối được tới Google Sheet: " + (err?.message || "")); });
    }, 1200);
  }, []);

  const save = useCallback((newData) => {
    setData(newData);
    try { sessionStorage.setItem("sico_auto", JSON.stringify(newData)); } catch {}
    pushToSheet(newData);
  }, [pushToSheet]);

  return [data, save, syncStatus, syncError];
};

// Ô hỏi nổi: chat nội bộ gọi thẳng API Claude + nút mở claude.ai khi cần hỏi mở rộng
function buildGarageContext(data, page) {
  const lowStock = data.parts.filter(p => p.stock <= p.minStock);
  const inGarage = data.repairOrders.filter(r => r.status !== "Đã xuất xưởng" && r.status !== "Huỷ" && r.status !== "Hoàn thành");
  const alertsVehicles = data.vehicles.filter(v => alertLevel(daysUntil(v.registrationExpiry)) !== "ok" || alertLevel(daysUntil(v.insuranceExpiry)) !== "ok");
  const approvedQuotes = (data.quotes || []).filter(q => q.status === "Đã duyệt");

  return [
    `Trang hiện tại: ${page}`,
    `Tổng khách hàng: ${data.customers.length}`,
    `Tổng xe: ${data.vehicles.length}`,
    `Xe đang trong garage (chưa xuất xưởng): ${inGarage.length} — ${inGarage.slice(0,10).map(r => {
      const v = data.vehicles.find(v => v.id === r.vehicleId);
      return `${v?.licensePlate || "?"} (${r.status})`;
    }).join(", ")}`,
    `Xe sắp/đã hết hạn đăng kiểm hoặc bảo hiểm: ${alertsVehicles.length} — ${alertsVehicles.slice(0,10).map(v => v.licensePlate).join(", ")}`,
    `Vật tư sắp hết hàng (dưới mức tối thiểu): ${lowStock.length} — ${lowStock.slice(0,10).map(p => `${p.name} (còn ${p.stock} ${p.unit})`).join(", ")}`,
    `Báo giá đã duyệt: ${approvedQuotes.length} / ${(data.quotes||[]).length} tổng, tổng doanh thu ${formatCurrency(approvedQuotes.reduce((s,q)=>s+(Number(q.total)||0),0))}`,
    `Tổng lệnh sửa chữa: ${data.repairOrders.length}`,
  ].join("\n");
}

function AskClaudeWidget({ data, page }) {
  const [open, setOpen] = useState(false);
  const [messages, setMessages] = useState([
    { role: "assistant", text: "Xin chào! Tôi có thể giúp bạn tra cứu nhanh về tình trạng garage: xe sắp hết hạn đăng kiểm, vật tư sắp hết, báo giá, lệnh sửa chữa... Bạn muốn hỏi gì?" }
  ]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [apiKey, setApiKey] = useState(() => { try { return localStorage.getItem("sico_gemini_api_key") || ""; } catch { return ""; } });
  const [keyInput, setKeyInput] = useState(apiKey);
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, open, showSettings]);

  const saveApiKey = () => {
    const k = keyInput.trim();
    setApiKey(k);
    try { localStorage.setItem("sico_gemini_api_key", k); } catch {}
    setShowSettings(false);
    setMessages(m => [...m, { role: "assistant", text: k ? "✅ Đã lưu API key (Google Gemini, miễn phí) trên trình duyệt này. Bạn có thể đặt câu hỏi ngay." : "Đã xoá API key." }]);
  };
  const clearApiKey = () => {
    setApiKey(""); setKeyInput("");
    try { localStorage.removeItem("sico_gemini_api_key"); } catch {}
  };

  const send = async () => {
    const q = input.trim();
    if (!q || loading) return;
    if (!apiKey) { setShowSettings(true); return; }
    setInput("");
    const newMessages = [...messages, { role: "user", text: q }];
    setMessages(newMessages);
    setLoading(true);
    try {
      const context = buildGarageContext(data, page);
      const systemPrompt = "Bạn là trợ lý AI nội bộ cho phần mềm quản lý Garage ô tô SICO AUTO. Trả lời ngắn gọn, đúng trọng tâm, bằng tiếng Việt. Dưới đây là dữ liệu thực tế hiện tại của garage để bạn dùng khi trả lời câu hỏi liên quan:\n\n" + context;

      // Gemini dùng định dạng "contents" với role user/model, không có "assistant"
      const geminiContents = newMessages
        .filter(m => m.role === "user" || m.role === "assistant")
        .map(m => ({ role: m.role === "assistant" ? "model" : "user", parts: [{ text: m.text }] }));

      const response = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${encodeURIComponent(apiKey)}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: geminiContents,
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { maxOutputTokens: 1000 },
          })
        }
      );

      if (!response.ok) {
        let detail = "";
        try { const errJson = await response.json(); detail = errJson?.error?.message || JSON.stringify(errJson); } catch {}
        if (response.status === 400 && /API key not valid/i.test(detail)) {
          throw new Error("API key không hợp lệ. Vào ⚙️ Cài đặt để kiểm tra lại key lấy từ aistudio.google.com/apikey.");
        }
        if (response.status === 429) throw new Error(`Đã vượt giới hạn miễn phí (rate limit). Chi tiết từ Google: ${detail || "không rõ"}\n\nNếu đây là lần hỏi đầu tiên, có thể key vừa tạo chưa được cấp quota — đợi 1-2 phút rồi thử lại. Nếu vẫn lỗi, kiểm tra tại aistudio.google.com/apikey xem key có ở đúng project chưa bật billing hay bị giới hạn riêng không.`);
        if (response.status === 403) throw new Error(`Bị từ chối truy cập (403). Chi tiết: ${detail || "không rõ"}`);
        throw new Error(`HTTP ${response.status}${detail ? " — " + detail : ""}`);
      }

      const result = await response.json();
      const text = result?.candidates?.[0]?.content?.parts?.map(p => p.text || "").join("\n").trim()
        || "Xin lỗi, tôi không nhận được phản hồi. Vui lòng thử lại.";
      setMessages(m => [...m, { role: "assistant", text }]);
    } catch (err) {
      const isNetworkErr = err instanceof TypeError;
      const reason = isNetworkErr
        ? "Trình duyệt chặn request này (CORS) hoặc không có kết nối mạng tới Google. Nếu vẫn lỗi, hãy dùng nút 'Mở claude.ai' bên dưới."
        : err.message;
      setMessages(m => [...m, { role: "assistant", text: `⚠️ Không kết nối được tới AI.\n\n${reason}` }]);
    } finally {
      setLoading(false);
    }
  };

  const openClaudeAi = () => {
    const context = buildGarageContext(data, page);
    const lastQuestion = [...messages].reverse().find(m => m.role === "user")?.text || "";
    const prefill = `Đây là dữ liệu hiện tại từ hệ thống quản lý Garage SICO AUTO:\n\n${context}\n\nCâu hỏi của tôi: ${lastQuestion}`;
    navigator.clipboard?.writeText(prefill).catch(() => {});
    window.open("https://claude.ai/new", "_blank");
  };

  const inputStyle = { width: "100%", padding: "9px 12px", border: "1px solid #ddd", borderRadius: 8, fontSize: 13, outline: "none", boxSizing: "border-box" };

  return (
    <>
      {/* Nút nổi mở/đóng */}
      <button onClick={() => setOpen(o => !o)} title="Hỏi AI"
        style={{ position: "fixed", bottom: 24, right: 24, width: 56, height: 56, borderRadius: "50%", background: "linear-gradient(135deg,#1a237e,#1565c0)", color: "#fff", border: "none", boxShadow: "0 4px 16px rgba(26,35,126,0.4)", cursor: "pointer", fontSize: 24, zIndex: 9998, display: "flex", alignItems: "center", justifyContent: "center" }}>
        {open ? "✕" : "🤖"}
      </button>

      {open && (
        <div style={{ position: "fixed", bottom: 90, right: 24, width: 360, maxWidth: "calc(100vw - 32px)", height: 480, maxHeight: "calc(100vh - 130px)", background: "#fff", borderRadius: 14, boxShadow: "0 8px 40px rgba(0,0,0,0.3)", zIndex: 9998, display: "flex", flexDirection: "column", overflow: "hidden" }}>
          {/* Header */}
          <div style={{ background: "linear-gradient(90deg,#1a237e,#1565c0)", color: "#fff", padding: "12px 16px", display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 22 }}>🤖</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 800, fontSize: 13 }}>Hỏi AI (Gemini — miễn phí)</div>
              <div style={{ fontSize: 10, color: "#90caf9" }}>{apiKey ? "Đã kết nối API key" : "Chưa cấu hình API key"}</div>
            </div>
            <button onClick={() => setShowSettings(s => !s)} title="Cài đặt API key"
              style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 6, cursor: "pointer", padding: "5px 8px", color: "#fff", fontSize: 14 }}>⚙️</button>
          </div>

          {/* SETTINGS PANEL */}
          {showSettings && (
            <div style={{ padding: 14, borderBottom: "1px solid #eee", background: "#f5f7fb", display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#1a237e" }}>🔑 API Key của Google Gemini (miễn phí)</div>
              <div style={{ fontSize: 11, color: "#666", lineHeight: 1.5 }}>
                Lấy key miễn phí tại <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener" style={{ color: "#1565c0" }}>aistudio.google.com/apikey</a> — đăng nhập Google, bấm "Create API key", không cần thẻ tín dụng.
                Key chỉ lưu trên trình duyệt này (localStorage), không gửi đi đâu khác ngoài Google.
              </div>
              <input type="password" value={keyInput} onChange={e => setKeyInput(e.target.value)} placeholder="AIzaSy..."
                style={inputStyle} />
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={saveApiKey} style={{ flex: 1, padding: "8px", background: "#1a237e", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 700 }}>💾 Lưu</button>

                ✅ Free tier: ~15 lượt hỏi/phút, không giới hạn ngày dùng thử, không cần nạp tiền.
              </div>

    error:   { icon: "⚠️", text: "Lỗi đồng bộ", color: "#c62828" },
  };
  const cfg = map[status] || map.idle;
  return (
    <div style={{ position: "relative" }}>
      <div onClick={() => error && setShowDetail(s => !s)}
        style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: cfg.color, fontWeight: 600, cursor: error ? "pointer" : "default", padding: "4px 9px", borderRadius: 12, background: cfg.color + "15" }}>
        <span style={{ fontSize: 12 }}>{cfg.icon}</span> {cfg.text}
      </div>
      {showDetail && error && (
        <div style={{ position: "absolute", top: 30, right: 0, width: 280, background: "#fff", border: "1px solid #ffcdd2", borderRadius: 8, padding: 12, boxShadow: "0 4px 16px rgba(0,0,0,0.15)", zIndex: 9999, fontSize: 12, color: "#c62828", lineHeight: 1.5 }}>
          {error}
          <div style={{ marginTop: 8, fontSize: 11, color: "#888" }}>Dữ liệu vẫn được lưu tạm trên trình duyệt này, nhưng chưa đồng bộ lên Google Sheet. Kiểm tra kết nối mạng hoặc URL Apps Script.</div>
        </div>
      )}
    </div>
  );
}

    sessionStorage.setItem("sico_user", JSON.stringify(user));

// Click vào ô để sửa, Enter/blur để lưu, Esc để huỷ.
function EditableCell({ value, onSave, type = "text", options, display, align = "left", width, placeholder, formatter }) {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value ?? "");
  const ref = React.useRef(null);

  React.useEffect(() => { setDraft(value ?? ""); }, [value]);
  React.useEffect(() => { if (editing && ref.current) { ref.current.focus(); if (ref.current.select) ref.current.select(); } }, [editing]);

  const commit = () => {
    setEditing(false);
    if (draft !== value) onSave(draft);
  };
  const cancel = () => { setDraft(value ?? ""); setEditing(false); };
  const onKeyDown = (e) => {
    if (e.key === "Enter") { e.preventDefault(); commit(); }
    else if (e.key === "Escape") { e.preventDefault(); cancel(); }
  };

  if (!editing) {
    const shown = display !== undefined ? display : (formatter ? formatter(value) : (value || (placeholder ? <span style={{ color: "#bbb" }}>{placeholder}</span> : "")));
    return (
      <div onClick={() => setEditing(true)} title="Bấm để sửa"
        style={{ minHeight: 26, padding: "3px 6px", borderRadius: 4, cursor: "text", textAlign: align, border: "1px solid transparent" }}
        onMouseEnter={e => { e.currentTarget.style.background = "#f0f4ff"; e.currentTarget.style.border = "1px dashed #c5cae9"; }}
        onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.border = "1px solid transparent"; }}>
        {shown}
      </div>
    );
  }

  const commonStyle = { width: width || "100%", padding: "4px 6px", border: "2px solid #1a237e", borderRadius: 4, fontSize: 12, textAlign: align, background: "#fffde7", boxSizing: "border-box" };

  if (type === "select") {
    return (
      <select ref={ref} value={draft} onChange={e => setDraft(e.target.value)} onBlur={commit} onKeyDown={onKeyDown} style={commonStyle}>
        {options.map(o => typeof o === "string" ? <option key={o} value={o}>{o}</option> : <option key={o.value} value={o.value}>{o.label}</option>)}
      </select>
    );
  }
  if (type === "date") {
    return <input ref={ref} type="date" value={draft} onChange={e => setDraft(e.target.value)} onBlur={commit} onKeyDown={onKeyDown} style={commonStyle} />;
  }
  if (type === "number") {
    return <input ref={ref} type="number" value={draft} onChange={e => setDraft(e.target.value)} onBlur={commit} onKeyDown={onKeyDown} style={commonStyle} />;
  }
  return <input ref={ref} type="text" value={draft} onChange={e => setDraft(e.target.value)} onBlur={commit} onKeyDown={onKeyDown} placeholder={placeholder} style={commonStyle} />;
}

function Dashboard({ data, setPage, alerts }) {

          <div style={{ fontWeight: 700, color: "#1a237e", marginBottom: 14, fontSize: 15 }}>🔧 Lệnh sửa chữa đang xử lý</div>
          <Table
            headers={["Mã LSC", "Biển số", "Khách hàng", "Triệu chứng", "Trạng thái", "KTV"]}
            rows={pending.slice(0, 6).map(r => {

// ===================== CUSTOMERS PAGE =====================
function CustomersPage({ data, update, showToast }) {
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState(EMPTY_CUSTOMER);
  const [expandedId, setExpandedId] = useState(null);
  const [vehicleModal, setVehicleModal] = useState(null);
  const [vehicleForm, setVehicleForm] = useState(EMPTY_VEHICLE);

  const filtered = data.customers.filter(c =>
    c.name.toLowerCase().includes(search.toLowerCase()) ||
    c.phone.includes(search)
  );

  const openNew = () => { setForm({ ...EMPTY_CUSTOMER, id: generateId() }); setModal("form"); };
  const openEdit = (c) => { setForm({ ...c }); setModal("form"); };
  const save = () => {
    if (!form.name || !form.phone) return showToast("Vui lòng nhập tên và SĐT", "error");
    const exists = data.customers.find(c => c.id === form.id);
    const updated = exists ? data.customers.map(c => c.id === form.id ? form : c) : [...data.customers, form];
    update("customers", updated);
    showToast(exists ? "Đã cập nhật khách hàng" : "Đã thêm khách hàng");
    setModal(null);
  };
  const del = (id) => {
    if (!window.confirm("Xóa khách hàng này?")) return;
    update("customers", data.customers.filter(c => c.id !== id));
    showToast("Đã xóa khách hàng");
  };

  // ---- Quản lý xe của khách hàng ----
  const openNewVehicle = (customerId) => {
    setVehicleForm({ ...EMPTY_VEHICLE, id: generateId(), customerId });
    setVehicleModal("form");
  };
  const openEditVehicle = (v) => {
    setVehicleForm({ ...v });
    setVehicleModal("form");
  };
  const saveVehicle = () => {
    if (!vehicleForm.licensePlate) return showToast("Vui lòng nhập biển số xe", "error");
    const exists = data.vehicles.find(v => v.id === vehicleForm.id);
    const updated = exists ? data.vehicles.map(v => v.id === vehicleForm.id ? vehicleForm : v) : [...data.vehicles, vehicleForm];
    update("vehicles", updated);
    showToast(exists ? "Đã cập nhật thông tin xe" : "Đã thêm xe mới");
    setVehicleModal(null);
  };
  const delVehicle = (id) => {
    if (!window.confirm("Xóa xe này?")) return;
    update("vehicles", data.vehicles.filter(v => v.id !== id));
    showToast("Đã xóa xe");
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <Card>
        <div style={{ display: "flex", gap: 10, justifyContent: "space-between", alignItems: "center", flexWrap: "wrap" }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <span style={{ fontSize: 13, color: "#666" }}>🔍</span>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Tìm theo tên, SĐT..."
              style={{ padding: "7px 12px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13, width: 240 }} />
          </div>
          <Btn onClick={openNew}>➕ Thêm khách hàng</Btn>
        </div>
      </Card>
      <Card>
        <Table
          headers={["Tên khách hàng", "Điện thoại", "Địa chỉ", "Email", "Số xe", "Thao tác"]}
          rows={filtered.map(c => {
            const vehicleCount = data.vehicles.filter(v => v.customerId === c.id).length;
            return [
              <span style={{ fontWeight: 700, color: "#1a237e", cursor: "pointer" }} onClick={() => setExpandedId(expandedId === c.id ? null : c.id)}>
                {expandedId === c.id ? "▼ " : "▶ "}{c.name}
              </span>,
              c.phone, c.address || "-", c.email || "-",
              <Badge label={`${vehicleCount} xe`} color="#1565c0" />,
              <div style={{ display: "flex", gap: 6 }}>
                <Btn size="sm" onClick={() => openEdit(c)} outline>✏️ Sửa</Btn>
                <Btn size="sm" onClick={() => del(c.id)} color="#c62828" outline>🗑️</Btn>
              </div>
            ];
          })}
        />
      </Card>

      {/* ===== Danh sách xe của khách hàng đang mở ===== */}
      {expandedId && (() => {
        const cust = data.customers.find(c => c.id === expandedId);
        const custVehicles = data.vehicles.filter(v => v.customerId === expandedId);
        return (
          <Card>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontWeight: 700, color: "#1a237e" }}>🚗 Xe của khách hàng: {cust?.name}</div>
              <Btn size="sm" onClick={() => openNewVehicle(expandedId)}>➕ Thêm xe</Btn>
            </div>
            {custVehicles.length === 0 ? (
              <div style={{ textAlign: "center", padding: 20, color: "#aaa" }}>Khách hàng chưa có xe nào</div>
            ) : (
              <Table
                headers={["Biển số", "Số khung", "Số máy", "Loại xe", "Ngày vô xưởng", "Ngày xuất xưởng", "Thao tác"]}
                rows={custVehicles.map(v => [
                  <span style={{ fontWeight: 800, color: "#1a237e", fontSize: 14 }}>{v.licensePlate || "-"}</span>,
                  <span style={{ fontSize: 11, fontFamily: "monospace" }}>{v.frameNumber || "-"}</span>,
                  <span style={{ fontSize: 11, fontFamily: "monospace" }}>{v.engineNumber || "-"}</span>,
                  <div><div style={{ fontWeight: 600 }}>{v.vehicleName || "-"}</div><div style={{ fontSize: 11, color: "#888" }}>{v.brand} {v.type}</div></div>,
                  <span style={{ fontSize: 12 }}>{v.inDate ? formatDate(v.inDate) : "-"}</span>,
                  v.outDate
                    ? <span style={{ fontSize: 12, color: "#2e7d32", fontWeight: 600 }}>{formatDate(v.outDate)}</span>
                    : <span style={{ fontSize: 12, color: "#f57c00", fontWeight: 600 }}>Chưa xuất</span>,
                  <div style={{ display: "flex", gap: 4 }}>
                    <Btn size="sm" onClick={() => openEditVehicle(v)} outline>✏️</Btn>
                    <Btn size="sm" onClick={() => delVehicle(v.id)} color="#c62828" outline>🗑️</Btn>
                  </div>
                ])}
              />
            )}
          </Card>
        );
      })()}

      {/* ===== MODAL: Thêm/sửa khách hàng ===== */}
      {modal === "form" && (
        <Modal title={form.id && data.customers.find(c => c.id === form.id) ? "Cập nhật khách hàng" : "Thêm khách hàng"} onClose={() => setModal(null)}>
          <Grid cols={2} gap={14}>
            <Input label="Họ và tên" value={form.name} onChange={v => setForm({ ...form, name: v })} required />
            <Input label="Số điện thoại" value={form.phone} onChange={v => setForm({ ...form, phone: v })} required />
            <Input label="Email" value={form.email} onChange={v => setForm({ ...form, email: v })} />
            <Input label="Địa chỉ" value={form.address} onChange={v => setForm({ ...form, address: v })} />
          </Grid>
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 20 }}>
            <Btn outline color="#666" onClick={() => setModal(null)}>Huỷ</Btn>
            <Btn onClick={save}>💾 Lưu</Btn>
          </div>
        </Modal>
      )}

      {/* ===== MODAL: Thêm/sửa xe của khách hàng ===== */}
      {vehicleModal === "form" && (
        <Modal title={data.vehicles.find(v => v.id === vehicleForm.id) ? "Cập nhật thông tin xe" : "Thêm xe mới"} onClose={() => setVehicleModal(null)} width={680}>
          <Grid cols={2} gap={14}>
            <Input label="Biển số xe" value={vehicleForm.licensePlate} onChange={v => setVehicleForm({ ...vehicleForm, licensePlate: v.toUpperCase() })} required />
            <Input label="Loại xe" value={vehicleForm.type} onChange={v => setVehicleForm({ ...vehicleForm, type: v })} options={VEHICLE_TYPES} />
            <Input label="Số khung (VIN)" value={vehicleForm.frameNumber} onChange={v => setVehicleForm({ ...vehicleForm, frameNumber: v.toUpperCase() })} />
            <Input label="Số máy" value={vehicleForm.engineNumber} onChange={v => setVehicleForm({ ...vehicleForm, engineNumber: v.toUpperCase() })} />
            <Input label="Tên xe / Nhãn hiệu" value={vehicleForm.vehicleName} onChange={v => setVehicleForm({ ...vehicleForm, vehicleName: v })} />
            <Input label="Hãng xe" value={vehicleForm.brand} onChange={v => setVehicleForm({ ...vehicleForm, brand: v })} options={VEHICLE_BRANDS} />

    </div>

function VehiclesPage({ data, update, showToast }) {
  const [search, setSearch] = useState("");

  const [form, setForm] = useState(EMPTY_VEHICLE);
  const [filter, setFilter] = useState("all");

  const filtered = data.vehicles.filter(v => {
    const q = search.toLowerCase();
    const match = v.licensePlate.toLowerCase().includes(q) || v.vehicleName.toLowerCase().includes(q) ||
      v.frameNumber.toLowerCase().includes(q) || (data.customers.find(c => c.id === v.customerId)?.name || "").toLowerCase().includes(q);
    if (!match) return false;
    if (filter === "reg") return alertLevel(daysUntil(v.registrationExpiry)) !== "ok";
    if (filter === "ins") return alertLevel(daysUntil(v.insuranceExpiry)) !== "ok";
    return true;
  });

  const openNew = () => { setForm({ ...EMPTY_VEHICLE, id: generateId() }); setModal("form"); };
  const openEdit = (v) => { setForm({ ...v }); setModal("form"); };
  const save = () => {
    if (!form.licensePlate || !form.customerId) return showToast("Vui lòng nhập biển số và chọn khách hàng", "error");
    const exists = data.vehicles.find(v => v.id === form.id);
    const updated = exists ? data.vehicles.map(v => v.id === form.id ? form : v) : [...data.vehicles, form];
    update("vehicles", updated);
    showToast(exists ? "Đã cập nhật thông tin xe" : "Đã tiếp nhận xe mới");
    setModal(null);
  };
  const del = (id) => {
    if (!window.confirm("Xóa xe này?")) return;
    update("vehicles", data.vehicles.filter(v => v.id !== id));
    showToast("Đã xóa xe");

  const regLevel = (v) => alertLevel(daysUntil(v.registrationExpiry));

  return (

              style={{ padding: "7px 12px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13, width: 260 }} />

      <Card>
        <Table
          headers={["Biển số", "Xe / Nhãn hiệu", "Số khung", "Số máy", "Km hiện tại", "Khách hàng", "Vô xưởng", "Xuất xưởng", "Đăng kiểm", "Bảo hiểm", "Thao tác"]}
          rows={filtered.map(v => {
            const cust = data.customers.find(c => c.id === v.customerId);
            const rl = regLevel(v), il = insLevel(v);

            <Input label="Chủng loại" value={form.type} onChange={v => setForm({ ...form, type: v })} options={VEHICLE_TYPES} />

const DIAGNOSIS_TOOLS = ["LAUNCH X431 Pro", "AUTEL MaxiSys MS906BT", "BOSCH KTS 590", "SNAP-ON VERUS Edge", "FOXWELL NT809", "iCarsoft MB V3.0", "Thinkcar Thinktool Pro", "OBD2 Generic", "Khác"];
const DTC_SYSTEMS = ["Động cơ (Engine)", "Hộp số (Transmission)", "Phanh ABS/ESP", "Túi khí (Airbag/SRS)", "Điều hòa (A/C)", "Điện thân xe (Body)", "Hệ thống lái (EPS)", "Nhiên liệu/Khí thải", "Khác"];
const DTC_STATUS_OPT = ["Hiện hành (Active)", "Lịch sử (Stored)", "Đang chờ (Pending)"];
const FUEL_LEVELS = ["E (hết)", "1/8", "1/4", "3/8", "1/2", "5/8", "3/4", "7/8", "F (đầy)"];
const EMPTY_DTC = { code: "", system: "", desc: "", status: "Hiện hành (Active)", action: "" };

function RepairPage({ data, update, showToast, can }) {
  const [search, setSearch] = useState("");
  const [statusFilter, setStatusFilter] = useState("all");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ ...EMPTY_REPAIR_ORDER });
  const [orderParts, setOrderParts] = useState([]);
  const [activeTab, setActiveTab] = useState("receive");

  const filtered = data.repairOrders.filter(r => {
    const v = data.vehicles.find(v => v.id === r.vehicleId);
    const c = data.customers.find(c => c.id === r.customerId);
    const q = search.toLowerCase();
    const match = (v?.licensePlate || "").toLowerCase().includes(q) || (c?.name || "").toLowerCase().includes(q) || r.id.toLowerCase().includes(q);
    if (statusFilter !== "all" && r.status !== statusFilter) return false;
    return match;
  });

  const openNew = () => {
    const now = new Date();
    const hhmm = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
    setForm({ ...EMPTY_REPAIR_ORDER, id: generateId(), receiveDate: today(), receiveTime: hhmm, diagnosisDate: today(), dtcCodes: [] });
    setOrderParts([]);
    setActiveTab("receive");
    setModal("form");
  };
  const openEdit = (r) => {
    setForm({ ...r, dtcCodes: r.dtcCodes || [], exteriorCondition: r.exteriorCondition || {}, interiorItems: r.interiorItems || {} });
    setOrderParts(r.parts || []);
    setActiveTab("receive");
    setModal("form");
  };
  const openView = (r) => {
    setForm({ ...r, dtcCodes: r.dtcCodes || [], exteriorCondition: r.exteriorCondition || {}, interiorItems: r.interiorItems || {} });
    setOrderParts(r.parts || []);
    setActiveTab("receive");
    setModal("view");
  };

  const setF = (patch) => setForm(f => ({ ...f, ...patch }));
  const setExt = (key) => setForm(f => ({ ...f, exteriorCondition: { ...f.exteriorCondition, [key]: !f.exteriorCondition?.[key] } }));
  const setInt = (key) => setForm(f => ({ ...f, interiorItems: { ...f.interiorItems, [key]: !f.interiorItems?.[key] } }));

  // DTC codes
  const addDTC = () => setForm(f => ({ ...f, dtcCodes: [...(f.dtcCodes || []), { ...EMPTY_DTC }] }));
  const removeDTC = (i) => setForm(f => ({ ...f, dtcCodes: f.dtcCodes.filter((_, idx) => idx !== i) }));
  const updateDTC = (i, field, val) => setForm(f => {
    const codes = [...f.dtcCodes]; codes[i] = { ...codes[i], [field]: val }; return { ...f, dtcCodes: codes };
  });

  // Parts
  const calcTotal = (f, pts) => {
    const totalParts = pts.reduce((s, p) => s + (p.qty * p.price), 0);
    const totalAmount = (Number(f.totalLabor) || 0) + totalParts - (Number(f.discount) || 0);
    return { totalParts, totalAmount };
  };
  const addPart = () => setOrderParts(p => [...p, { partId: "", name: "", qty: 1, unit: "", price: 0 }]);
  const removePart = (i) => setOrderParts(p => p.filter((_, idx) => idx !== i));
  const updatePart = (i, field, val) => {
    const pts = [...orderParts]; pts[i] = { ...pts[i], [field]: val };
    if (field === "partId") { const p = data.parts.find(p => p.id === val); if (p) { pts[i].name = p.name; pts[i].unit = p.unit; pts[i].price = p.salePrice; } }
    setOrderParts(pts);
  };

  const save = () => {

                  <thead>
                    <tr style={{ background: "#e8eaf6" }}>
                      {["Vật tư / Phụ tùng", "SL", "ĐV", "Đơn giá", "Thành tiền", ""].map((h, i) => (

                              <option value="">-- Chọn từ kho --</option>

              {sectionHead("📝", "Ghi chú công việc sửa chữa")}
              <textarea value={form.notes || ""} onChange={e => setF({ notes: e.target.value })} rows={3}
                style={{ ...inputStyle, resize: "vertical" }} placeholder="Mô tả công việc đã thực hiện, lưu ý kỹ thuật..." />
            </>)}

            {/* ===== TAB 4: QUYẾT TOÁN ===== */}
            {activeTab === "payment" && (<>
              {sectionHead("💰", "Quyết toán chi phí")}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12, marginBottom: 16 }}>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: "#555", display: "block", marginBottom: 4 }}>Tiền công lao động (đ)</label>
                  <input type="number" value={form.totalLabor} onChange={e => setF({ totalLabor: e.target.value })} style={inputStyle} />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: "#555", display: "block", marginBottom: 4 }}>Tiền vật tư (tự tính)</label>
                  <div style={{ padding: "7px 10px", background: "#f5f5f5", borderRadius: 6, fontSize: 13, fontWeight: 700, color: "#2e7d32" }}>{formatCurrency(totalParts)}</div>
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: "#555", display: "block", marginBottom: 4 }}>Chiết khấu (đ)</label>
                  <input type="number" value={form.discount} onChange={e => setF({ discount: e.target.value })} style={inputStyle} />
                </div>
              </div>
              <div style={{ display: "flex", gap: 16, marginBottom: 16, padding: "16px 20px", background: "linear-gradient(90deg,#1a237e,#1565c0)", borderRadius: 10 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, color: "#90caf9" }}>Tiền công</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "#fff" }}>{formatCurrency(Number(form.totalLabor)||0)}</div>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 12, color: "#90caf9" }}>Tiền vật tư</div>
                  <div style={{ fontSize: 18, fontWeight: 800, color: "#fff" }}>{formatCurrency(totalParts)}</div>
                </div>
                <div style={{ flex: 1, borderLeft: "1px solid rgba(255,255,255,0.2)", paddingLeft: 16 }}>
                  <div style={{ fontSize: 12, color: "#90caf9" }}>TỔNG THANH TOÁN</div>
                  <div style={{ fontSize: 26, fontWeight: 900, color: "#69f0ae" }}>{formatCurrency(totalAmount)}</div>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: "#555", display: "block", marginBottom: 4 }}>Đã thanh toán (đ)</label>
                  <input type="number" value={form.paid || 0} onChange={e => setF({ paid: e.target.value })} style={inputStyle} />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: "#555", display: "block", marginBottom: 4 }}>Còn nợ</label>
                  <div style={{ padding: "7px 10px", background: "#ffebee", borderRadius: 6, fontSize: 14, fontWeight: 800, color: "#c62828" }}>
                    {formatCurrency(Math.max(0, totalAmount - (Number(form.paid)||0)))}
                  </div>
                </div>
              </div>
            </>)}

          </div>{/* end pointerEvents wrapper */}

          {/* Footer actions */}
          <div style={{ display: "flex", gap: 10, justifyContent: "space-between", alignItems: "center", marginTop: 20, paddingTop: 16, borderTop: "1px solid #eee" }}>
            <div style={{ display: "flex", gap: 8 }}>
              {FORM_TABS.map((t, i) => i > 0 && (
                <button key={t.id} onClick={() => setActiveTab(t.id)}
                  style={{ padding: "7px 14px", background: activeTab === t.id ? "#e8eaf6" : "transparent", border: "1px solid #e0e0e0", borderRadius: 6, cursor: "pointer", fontSize: 12, color: "#555" }}>
                  {t.label}
                </button>
              ))}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              {isView && <Btn outline color="#1565c0" onClick={() => printRepairOrder(form, orderParts, data)}>🖨️ In phiếu SC</Btn>}
              <Btn outline color="#666" onClick={() => setModal(null)}>{isView ? "Đóng" : "Huỷ"}</Btn>

        </Modal>
      )}
    </div>
  );
}

// ===================== QUOTES PAGE =====================
const EMPTY_QUOTE = {
  id: null, vehicleId: "", customerId: "", date: today(), status: "Chờ duyệt",
  receiveKm: "", customerRequest: "", notes: "", discount: 0, vatType: "no_vat", items: []
};
const EMPTY_QITEM = { type: "part", partId: "", name: "", qty: 1, unit: "Cái", costPrice: 0, salePrice: 0, hours: 1, laborRate: 150000 };

function QuotesPage({ data, update, showToast, can }) {
  const [form, setForm] = useState({ ...EMPTY_QUOTE, date: today() });
  const [modal, setModal] = useState(false);
  const [search, setSearch] = useState("");
  const [statusFilter, setStatusFilter] = useState("all");

  const filtered = (data.quotes || []).filter(q => {
    const c = data.customers.find(c => c.id === q.customerId);
    const v = data.vehicles.find(v => v.id === q.vehicleId);
    const q2 = search.toLowerCase();
    const match = !q2 || (v?.licensePlate || "").toLowerCase().includes(q2) || (c?.name || "").toLowerCase().includes(q2) || (q.id || "").toLowerCase().includes(q2);
    const statusOk = statusFilter === "all" || q.status === statusFilter;
    return match && statusOk;
  });

  // ---------- tính tiền ----------
  const calcItem = (it) => it.type === "labor"
    ? { rev: Number(it.hours) * Number(it.laborRate), cost: 0 }
    : { rev: Number(it.qty) * Number(it.salePrice), cost: Number(it.qty) * Number(it.costPrice) };

  const calcQuote = (q) => {
    const items = q.items || [];
    const totalRev   = items.reduce((s, it) => s + calcItem(it).rev, 0);
    const totalCost  = items.reduce((s, it) => s + calcItem(it).cost, 0);
    const disc       = Number(q.discount) || 0;
    const total      = totalRev - disc;
    const grossProfit = total - totalCost;
    return { totalRev, totalCost, disc, total, grossProfit };
  };

  const { totalRev, totalCost, disc, total, grossProfit } = calcQuote(form);

  // ---------- items ----------
  const addPartItem  = () => setForm(f => ({ ...f, items: [...f.items, { ...EMPTY_QITEM, id: generateId() }] }));
  const addLaborItem = () => setForm(f => ({ ...f, items: [...f.items, { ...EMPTY_QITEM, id: generateId(), type: "labor", name: "Công lao động", unit: "Giờ" }] }));
  const removeItem   = (i) => setForm(f => ({ ...f, items: f.items.filter((_, idx) => idx !== i) }));
  const updateItem   = (i, field, val) => setForm(f => {
    const items = [...f.items];
    items[i] = { ...items[i], [field]: val };
    if (field === "partId" && val) {
      const p = data.parts.find(p => p.id === val);
      if (p) { items[i].name = p.name; items[i].unit = p.unit; items[i].costPrice = p.costPrice; items[i].salePrice = p.salePrice; }
    }
    return { ...f, items };
  });

  // ---------- vehicle auto-fill ----------
  const handleVehicleChange = (vid) => {
    const v = data.vehicles.find(v => v.id === vid);
    setForm(f => ({ ...f, vehicleId: vid, customerId: v?.customerId || f.customerId, receiveKm: v?.currentKm || "" }));
  };

  // ---------- save / delete ----------
  const save = () => {
    if (!form.vehicleId || !form.customerId) return showToast("Chọn xe và khách hàng", "error");
    const id = form.id || generateId();
    const calc = calcQuote(form);
    const saved = { ...form, id, ...calc };
    const exists = (data.quotes || []).find(q => q.id === form.id);
    const updated = exists
      ? (data.quotes || []).map(q => q.id === form.id ? saved : q)
      : [...(data.quotes || []), saved];
    update("quotes", updated);
    showToast("Đã lưu báo giá");
    setModal(false);
  };
  const del = (id) => {
    if (!window.confirm("Xóa báo giá này?")) return;
    update("quotes", (data.quotes || []).filter(q => q.id !== id));
    showToast("Đã xóa");
  };

  // Sửa nhanh 1 trường ngay trên bảng danh sách (kiểu Excel)
  const updateQuoteField = (id, field, val) => {
    const q = (data.quotes || []).find(x => x.id === id);
    if (!q) return;
    let patched = { ...q, [field]: val };
    if (field === "discount") patched = { ...patched, ...calcQuote(patched) };
    update("quotes", (data.quotes || []).map(x => x.id === id ? patched : x));
    showToast("Đã cập nhật");
  };
  const openNew  = () => { setForm({ ...EMPTY_QUOTE, date: today() }); setModal(true); };
  const openEdit = (q) => { setForm({ ...q }); setModal(true); };

  const approvedQuotes = (data.quotes || []).filter(q => q.status === "Đã duyệt");
  const totalApproved  = approvedQuotes.reduce((s, q) => s + (Number(q.total) || 0), 0);
  const totalProfit    = approvedQuotes.reduce((s, q) => s + (Number(q.grossProfit) || 0), 0);
  const selVehicle     = data.vehicles.find(v => v.id === form.vehicleId);
  const selCustomer    = data.customers.find(c => c.id === form.customerId);

  const inpStyle = (extra = {}) => ({ padding: "6px 8px", border: "1px solid #ddd", borderRadius: 5, fontSize: 13, width: "100%", ...extra });
  const numInp   = (val, onChange, w = "100%", border = "#ddd", bg = "#fff") => (
    <input type="number" value={val} onChange={e => onChange(e.target.value)}
      style={{ padding: "5px 6px", border: "1px solid " + border, borderRadius: 4, fontSize: 12, width: w, background: bg, textAlign: "right" }} />
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14 }}>
        <StatCard label="Tổng báo giá" value={(data.quotes||[]).length} icon="🧾" color="#1a237e" />
        <StatCard label="Đã duyệt" value={approvedQuotes.length} icon="✅" color="#2e7d32" />
        <StatCard label="Doanh thu dự kiến" value={formatCurrency(totalApproved)} icon="💰" color="#1565c0" sub="Từ báo giá đã duyệt" />
        <StatCard label="Lãi ước tính" value={formatCurrency(totalProfit)} icon="📈" color={totalProfit >= 0 ? "#1565c0" : "#c62828"} sub="DT – Giá vốn VT" />
      </div>

      {/* Toolbar */}
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
            <div style={{ fontWeight: 700, color: "#1a237e" }}>Danh sách báo giá ({(data.quotes||[]).length})</div>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Tìm biển số, khách hàng..."
              style={{ padding: "6px 10px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13, width: 220 }} />
            <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)}
              style={{ padding: "6px 10px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13 }}>
              <option value="all">Tất cả trạng thái</option>
              {["Chờ duyệt","Đã duyệt","Đang thực hiện","Huỷ"].map(s => <option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          <Btn onClick={openNew}>➕ Tạo báo giá</Btn>
        </div>
      </Card>

      {/* List */}
      <Card>
        <div style={{ fontSize: 11, color: "#888", marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
          <span style={{ background: "#fffde7", border: "1px dashed #c5cae9", borderRadius: 4, padding: "1px 6px" }}>✏️</span>
          Bấm trực tiếp vào ô Ngày / Nội dung / Trạng thái để sửa nhanh — Enter để lưu, Esc để huỷ
        </div>
        <Table
          headers={!can("see_cost_price")
            ? ["Mã BG", "Ngày", "Khách hàng", "Xe / Biển số", "Nội dung", "Tổng BG", "Trạng thái", "Thao tác"]
            : ["Mã BG", "Ngày", "Khách hàng", "Xe / Biển số", "Nội dung", "Tổng BG", "Giá vốn VT", "Lãi ước tính", "Trạng thái", "Thao tác"]}
          rows={filtered.slice().reverse().map(q => {
            const c = data.customers.find(c => c.id === q.customerId);
            const v = data.vehicles.find(v => v.id === q.vehicleId);
            const profit = Number(q.grossProfit) || (Number(q.total) - Number(q.totalCost));
            const baseRow = [
              <span style={{ fontWeight: 800, color: "#1a237e" }}>#{(q.id||"").slice(-4).toUpperCase()}</span>,
              <EditableCell type="date" value={q.date} onSave={v => updateQuoteField(q.id, "date", v)} display={formatDate(q.date)} />,
              <div><div style={{ fontWeight: 700 }}>{c?.name||"-"}</div><div style={{ fontSize: 11, color: "#888" }}>{c?.phone||""}</div></div>,
              <div><div style={{ fontWeight: 700, color: "#1a237e" }}>{v?.licensePlate||"-"}</div><div style={{ fontSize: 11, color: "#888" }}>{v?.vehicleName||""}</div></div>,
              <EditableCell value={q.customerRequest} onSave={v => updateQuoteField(q.id, "customerRequest", v)}
                display={<span style={{ fontSize: 11, color: "#666" }}>{(q.customerRequest||"—").slice(0, 30)}</span>} placeholder="Nhập nội dung..." />,
              <span style={{ fontWeight: 700, color: "#2e7d32" }}>{formatCurrency(q.total)}</span>,
            ];
            const profitCols = can("see_cost_price") ? [
              <span style={{ color: "#e65100" }}>{formatCurrency(q.totalCost)}</span>,
              <span style={{ fontWeight: 700, color: profit >= 0 ? "#1565c0" : "#c62828" }}>{formatCurrency(profit)}</span>,
            ] : [];
            return [
              ...baseRow,
              ...profitCols,
              <EditableCell type="select" value={q.status} onSave={v => updateQuoteField(q.id, "status", v)}
                options={["Chờ duyệt","Đã duyệt","Đang thực hiện","Huỷ"]}
                display={<Badge label={q.status} color={q.status==="Đã duyệt"?"#2e7d32":q.status==="Huỷ"?"#c62828":"#f57c00"} />} />,
              <div style={{ display: "flex", gap: 4 }}>
                <Btn size="sm" onClick={() => openEdit(q)} outline>✏️ Mở</Btn>
                <Btn size="sm" onClick={() => del(q.id)} outline color="#c62828">🗑️</Btn>
              </div>
            ];
          })}
          emptyMsg="Chưa có báo giá nào"
        />
      </Card>

      {/* ===== MODAL ===== */}
      {modal && (
        <Modal title={form.id ? "Báo giá #" + (form.id||"").slice(-4).toUpperCase() : "Tạo báo giá mới"} onClose={() => setModal(false)} width={1020}>

          {/* HEADER INFO */}
          <div style={{ fontWeight: 700, color: "#1a237e", marginBottom: 8, padding: "4px 10px", background: "#e8eaf6", borderLeft: "4px solid #1a237e", borderRadius: 4 }}>🚗 Thông tin xe & Khách hàng</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 130px 130px 140px", gap: 10, marginBottom: 10 }}>
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "#555", display: "block", marginBottom: 3 }}>Xe <span style={{ color: "red" }}>*</span></label>
              <select value={form.vehicleId} onChange={e => handleVehicleChange(e.target.value)} style={{ ...inpStyle() }}>
                <option value="">-- Chọn xe --</option>
                {data.vehicles.map(v => <option key={v.id} value={v.id}>{v.licensePlate} – {v.vehicleName}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "#555", display: "block", marginBottom: 3 }}>Khách hàng <span style={{ color: "red" }}>*</span></label>
              <select value={form.customerId} onChange={e => setForm({ ...form, customerId: e.target.value })} style={{ ...inpStyle() }}>
                <option value="">-- Chọn --</option>
                {data.customers.map(c => <option key={c.id} value={c.id}>{c.name} – {c.phone}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "#555", display: "block", marginBottom: 3 }}>Ngày lập</label>
              <input type="date" value={form.date} onChange={e => setForm({ ...form, date: e.target.value })} style={inpStyle()} />
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "#555", display: "block", marginBottom: 3 }}>Trạng thái</label>
              <select value={form.status} onChange={e => setForm({ ...form, status: e.target.value })} style={inpStyle()}>
                {["Chờ duyệt","Đã duyệt","Huỷ"].map(s => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "#555", display: "block", marginBottom: 3 }}>VAT</label>
              <select value={form.vatType||"no_vat"} onChange={e => setForm({ ...form, vatType: e.target.value })} style={inpStyle()}>
                <option value="no_vat">Chưa bao gồm VAT</option>
                <option value="vat8">+ VAT 8%</option>
                <option value="vat10">+ VAT 10%</option>
                <option value="included">Đã bao gồm VAT</option>
              </select>
            </div>
          </div>

          {/* Vehicle info card - fully editable */}
          {selVehicle && (
            <div style={{ padding: "10px 12px", background: "#f5f7ff", borderRadius: 8, border: "1px solid #c5cae9", marginBottom: 10 }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: "6px 14px", fontSize: 12 }}>
                {[
                  ["Biển số", <strong style={{ color: "#1a237e", fontSize: 14 }}>{selVehicle.licensePlate}</strong>],
                  ["Tên xe", selVehicle.vehicleName],
                  ["Nhãn hiệu", selVehicle.brand],
                  ["Loại xe", selVehicle.type],
                  ["Màu sắc", selVehicle.color],
                  ["Năm SX", selVehicle.year],
                  ["Số khung", <span style={{ fontFamily: "monospace" }}>{selVehicle.frameNumber}</span>],
                  ["Số máy", <span style={{ fontFamily: "monospace" }}>{selVehicle.engineNumber}</span>],
                  ["Km hiện tại", Number(selVehicle.currentKm||0).toLocaleString() + " km"],
                  ["Hạn đăng kiểm", formatDate(selVehicle.registrationExpiry)],
                  ["Hạn bảo hiểm", formatDate(selVehicle.insuranceExpiry)],
                  ["SĐT khách", selCustomer?.phone || "-"],
                ].map(([lbl, val]) => (
                  <div key={lbl}><span style={{ color: "#888", fontWeight: 600 }}>{lbl}: </span>{val || "-"}</div>
                ))}
              </div>
            </div>
          )}

          <div style={{ display: "grid", gridTemplateColumns: "160px 1fr", gap: 10, marginBottom: 10 }}>
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "#555", display: "block", marginBottom: 3 }}>Km tiếp nhận</label>
              <input type="number" value={form.receiveKm} onChange={e => setForm({ ...form, receiveKm: e.target.value })} style={inpStyle()} />
            </div>
            <div>
              <label style={{ fontSize: 11, fontWeight: 600, color: "#555", display: "block", marginBottom: 3 }}>Khách hàng yêu cầu / Nội dung kiểm tra</label>
              <input value={form.customerRequest||""} onChange={e => setForm({ ...form, customerRequest: e.target.value })} style={inpStyle()} placeholder="Nhập nội dung khách yêu cầu..." />
            </div>
          </div>

          {/* ITEMS TABLE */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "12px 0 6px" }}>
            <div style={{ fontWeight: 700, color: "#1a237e", padding: "4px 10px", background: "#e8eaf6", borderLeft: "4px solid #1a237e", borderRadius: 4 }}>📋 Hạng mục báo giá</div>
            <div style={{ display: "flex", gap: 6 }}>
              <Btn size="sm" onClick={addPartItem} color="#1565c0" outline>📦 Thêm vật tư</Btn>
              <Btn size="sm" onClick={addLaborItem} color="#2e7d32" outline>⏱️ Thêm giờ công</Btn>
            </div>
          </div>

          <div style={{ overflowX: "auto" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
              <thead>
                <tr style={{ background: "#e8eaf6" }}>
                  <th style={{ padding: "7px 8px", textAlign: "left", color: "#1a237e", minWidth: 180 }}>Tên hạng mục</th>
                  <th style={{ padding: "7px 8px", textAlign: "center", color: "#1a237e", width: 50 }}>Loại</th>
                  {can("see_cost_price") && <th style={{ padding: "7px 8px", textAlign: "right", color: "#e65100", background: "#fff8e1", width: 105 }}>Giá nhập (đ)</th>}
                  <th style={{ padding: "7px 8px", textAlign: "right", color: "#2e7d32", background: "#e8f5e9", width: 115 }}>Giá bán / h (đ)</th>
                  <th style={{ padding: "7px 8px", textAlign: "center", color: "#1a237e", width: 72 }}>SL / Giờ</th>
                  <th style={{ padding: "7px 8px", textAlign: "center", color: "#1a237e", width: 48 }}>ĐV</th>
                  <th style={{ padding: "7px 8px", textAlign: "right", color: "#2e7d32", width: 105 }}>Thành tiền</th>
                  {can("see_cost_price") && <th style={{ padding: "7px 8px", textAlign: "right", color: "#1565c0", width: 100 }}>Lãi dòng</th>}
                  <th style={{ width: 28 }}></th>
                </tr>
              </thead>
              <tbody>
                {form.items.length === 0
                  ? <tr><td colSpan={can("see_cost_price") ? 9 : 7} style={{ padding: 20, textAlign: "center", color: "#aaa" }}>Chưa có hạng mục — nhấn nút phía trên để thêm</td></tr>
                  : form.items.map((it, i) => {
                    const { rev, cost } = calcItem(it);
                    const lineProfit = rev - cost;
                    const isPart = it.type !== "labor";
                    return (
                      <tr key={i} style={{ borderBottom: "1px solid #f0f0f0", background: isPart ? "#fff" : "#fdf3f6" }}>

                        {/* Tên - luôn chỉnh sửa được */}
                        <td style={{ padding: "4px 5px" }}>
                          {isPart && (
                            <select value={it.partId || ""} onChange={e => updateItem(i, "partId", e.target.value)}
                              style={{ width: "100%", padding: "3px 5px", border: "1px solid #90caf9", borderRadius: 4, fontSize: 11, marginBottom: 3, background: "#f5f5f5" }}>
                              <option value="">— Chọn từ kho (tuỳ chọn) —</option>
                              {data.parts.map(p => <option key={p.id} value={p.id}>{p.name} (tồn: {p.stock})</option>)}
                            </select>
                          )}
                          <input value={it.name} onChange={e => updateItem(i, "name", e.target.value)}
                            style={{ width: "100%", padding: "5px 7px", border: "1px solid #ddd", borderRadius: 4, fontSize: 12 }}
                            placeholder={isPart ? "Tên vật tư / dịch vụ" : "Tên công việc"} />
                        </td>

                        {/* Loại */}
                        <td style={{ padding: "4px 5px", textAlign: "center" }}>
                          <select value={it.type} onChange={e => updateItem(i, "type", e.target.value)}
                            style={{ fontSize: 10, padding: "3px 2px", border: "1px solid #ddd", borderRadius: 4, background: isPart ? "#e3f2fd" : "#e8f5e9", color: isPart ? "#1565c0" : "#2e7d32", fontWeight: 700 }}>
                            <option value="part">📦 VT</option>
                            <option value="labor">⏱️ GC</option>
                          </select>
                        </td>

                        {/* Giá nhập - ẩn với quoter */}
                        {can("see_cost_price") && (
                          <td style={{ padding: "4px 5px", background: "#fffde7" }}>
                            {isPart
                              ? numInp(it.costPrice, v => updateItem(i, "costPrice", v), "100%", "#ffc107", "#fffde7")
                              : <div style={{ textAlign: "center", color: "#ccc", fontSize: 11 }}>—</div>}
                          </td>
                        )}

                        {/* Giá bán / đơn giá */}
                        <td style={{ padding: "4px 5px", background: "#f1f8e9" }}>
                          {isPart
                            ? numInp(it.salePrice, v => updateItem(i, "salePrice", v), "100%", "#a5d6a7", "#f1f8e9")
                            : numInp(it.laborRate, v => updateItem(i, "laborRate", v), "100%", "#90caf9", "#e3f2fd")}
                        </td>

                        {/* SL / Giờ */}
                        <td style={{ padding: "4px 5px" }}>
                          {numInp(isPart ? it.qty : it.hours, v => updateItem(i, isPart ? "qty" : "hours", v), "100%")}
                        </td>

                        {/* ĐV */}
                        <td style={{ padding: "4px 5px" }}>
                          <input value={it.unit} onChange={e => updateItem(i, "unit", e.target.value)}
                            style={{ width: "100%", padding: "5px 3px", border: "1px solid #ddd", borderRadius: 4, fontSize: 11, textAlign: "center" }} />
                        </td>

                        {/* Thành tiền - tự động */}
                        <td style={{ padding: "4px 8px", textAlign: "right", fontWeight: 700, color: "#2e7d32", fontSize: 13 }}>
                          {formatCurrency(rev)}
                        </td>

                        {/* Lãi dòng - ẩn với quoter */}
                        {can("see_cost_price") && (
                          <td style={{ padding: "4px 8px", textAlign: "right", fontWeight: 700, color: lineProfit >= 0 ? "#1565c0" : "#c62828" }}>
                            {formatCurrency(lineProfit)}
                          </td>
                        )}

                        {/* Xóa */}
                        <td style={{ padding: "4px 5px", textAlign: "center" }}>
                          <button onClick={() => removeItem(i)} style={{ background: "none", border: "none", cursor: "pointer", color: "#c62828", fontSize: 16, lineHeight: 1 }}>✕</button>
                        </td>
                      </tr>
                    );
                  })}
              </tbody>
              <tfoot>
                <tr style={{ background: "#f5f5f5" }}>
                  <td colSpan={can("see_cost_price") ? 6 : 4} style={{ padding: "6px 8px", fontWeight: 700, color: "#333" }}>Tổng trước chiết khấu</td>
                  <td style={{ padding: "6px 8px", textAlign: "right", fontWeight: 800, color: "#2e7d32" }}>{formatCurrency(totalRev)}</td>
                  {can("see_cost_price") && <td style={{ padding: "6px 8px", textAlign: "right", fontWeight: 800, color: "#1565c0" }}>{formatCurrency(totalRev - totalCost)}</td>}
                  <td></td>
                </tr>
                {can("see_cost_price") && (
                  <tr style={{ background: "#fff8e1" }}>
                    <td colSpan={7} style={{ padding: "6px 8px", color: "#e65100" }}>Tổng giá vốn vật tư</td>
                    <td style={{ padding: "6px 8px", textAlign: "right", color: "#e65100", fontWeight: 700 }}>{formatCurrency(totalCost)}</td>
                    <td></td>
                  </tr>
                )}
                <tr style={{ background: "#fff8e1" }}>
                  <td colSpan={can("see_cost_price") ? 5 : 3} style={{ padding: "6px 8px", color: "#e65100", fontWeight: 600 }}>Chiết khấu</td>
                  <td colSpan={2} style={{ padding: "6px 8px" }}>
                    <input type="number" value={form.discount} onChange={e => setForm({ ...form, discount: e.target.value })}
                      style={{ width: 130, padding: "5px 8px", border: "1px solid #ffc107", borderRadius: 4, fontSize: 13, textAlign: "right", background: "#fffde7" }} />
                  </td>
                  <td style={{ padding: "6px 8px", textAlign: "right", color: "#e65100", fontWeight: 700 }}>- {formatCurrency(disc)}</td>
                  <td></td>
                </tr>
                {(() => {
                  const vatRate = form.vatType === "vat8" ? 0.08 : form.vatType === "vat10" ? 0.10 : 0;
                  const vatAmt  = Math.round(total * vatRate);
                  const totalWithVat = total + vatAmt;
                  return (<>
                    {form.vatType !== "no_vat" && form.vatType !== "included" && vatRate > 0 && (
                      <tr style={{ background: "#fff8e1" }}>
                        <td colSpan={can("see_cost_price") ? 7 : 5} style={{ padding: "6px 8px", color: "#e65100" }}>VAT {form.vatType === "vat8" ? "8%" : "10%"}</td>
                        <td style={{ padding: "6px 8px", textAlign: "right", color: "#e65100", fontWeight: 700 }}>{formatCurrency(vatAmt)}</td>
                        <td></td>
                      </tr>
                    )}
                    <tr style={{ background: "#e8f5e9" }}>
                      <td colSpan={can("see_cost_price") ? 7 : 5} style={{ padding: "8px 10px", fontWeight: 800, fontSize: 14, color: "#2e7d32" }}>
                        TỔNG BÁO GIÁ KHÁCH TRẢ
                        {form.vatType === "included" && <span style={{ fontSize: 11, fontWeight: 400, marginLeft: 8 }}>(Đã bao gồm VAT)</span>}
                        {form.vatType !== "no_vat" && form.vatType !== "included" && vatRate > 0 && <span style={{ fontSize: 11, fontWeight: 400, marginLeft: 8 }}>(Đã bao gồm VAT {form.vatType === "vat8" ? "8%" : "10%"})</span>}
                      </td>
                      <td style={{ padding: "8px 10px", textAlign: "right", fontWeight: 900, fontSize: 17, color: "#2e7d32" }}>{formatCurrency(totalWithVat)}</td>
                      <td></td>
                    </tr>
                    {can("see_cost_price") && (
                      <tr style={{ background: "#e3f2fd" }}>
                        <td colSpan={7} style={{ padding: "6px 8px", fontWeight: 700, color: "#1565c0" }}>💰 Lãi ước tính (Doanh thu – Giá vốn VT)</td>
                        <td style={{ padding: "6px 8px", textAlign: "right", fontWeight: 800, fontSize: 14, color: grossProfit >= 0 ? "#1565c0" : "#c62828" }}>{formatCurrency(grossProfit)}</td>
                        <td></td>
                      </tr>
                    )}
                  </>);
                })()}
              </tfoot>
            </table>
          </div>

          {/* Ghi chú */}
          <div style={{ marginTop: 10 }}>
            <label style={{ fontSize: 11, fontWeight: 600, color: "#555", display: "block", marginBottom: 3 }}>Ghi chú</label>
            <textarea value={form.notes||""} onChange={e => setForm({ ...form, notes: e.target.value })} rows={2}
              style={{ width: "100%", padding: "7px 10px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13, resize: "vertical", boxSizing: "border-box" }} />
          </div>

          {/* Actions */}
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 16 }}>
            <Btn outline color="#1565c0" onClick={() => {
              const t = (form.items||[]).reduce((s,it) => s + (it.type==="labor" ? Number(it.hours)*Number(it.laborRate) : Number(it.qty)*Number(it.salePrice)), 0) - (Number(form.discount)||0);
              printQuote({...form, total: t}, data);
            }}>🖨️ In báo giá</Btn>
            <Btn outline color="#666" onClick={() => setModal(false)}>Huỷ</Btn>
            <Btn onClick={save}>💾 Lưu báo giá</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}
// ===================== PARTS PAGE =====================
function PartsPage({ data, update, showToast, can }) {
  const [tab, setTab] = useState("inventory");
  const [search, setSearch] = useState("");
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState(EMPTY_PART);
  const [moveForm, setMoveForm] = useState({ partId: "", type: "Nhập", qty: 1, note: "", date: today() });

  const filtered = data.parts.filter(p =>
    p.name.toLowerCase().includes(search.toLowerCase()) ||
    p.code.toLowerCase().includes(search.toLowerCase())
  );

  const openNew = () => { setForm({ ...EMPTY_PART, id: generateId() }); setModal("part"); };
  const openEdit = (p) => { setForm({ ...p }); setModal("part"); };
  const savePart = () => {
    if (!form.name || !form.code) return showToast("Nhập mã và tên vật tư", "error");
    const exists = data.parts.find(p => p.id === form.id);
    const updated = exists ? data.parts.map(p => p.id === form.id ? form : p) : [...data.parts, form];
    update("parts", updated);
    showToast(exists ? "Đã cập nhật" : "Đã thêm vật tư");
    setModal(null);
  };
  const del = (id) => {
    if (!window.confirm("Xóa vật tư?")) return;
    update("parts", data.parts.filter(p => p.id !== id));
    showToast("Đã xóa");
  };
  const saveMove = () => {
    if (!moveForm.partId || !moveForm.qty) return showToast("Chọn vật tư và số lượng", "error");
    const part = data.parts.find(p => p.id === moveForm.partId);
    if (!part) return;
    const newQty = moveForm.type === "Nhập" ? part.stock + Number(moveForm.qty) : Math.max(0, part.stock - Number(moveForm.qty));
    const newParts = data.parts.map(p => p.id === moveForm.partId ? { ...p, stock: newQty } : p);
    const movement = { id: generateId(), date: moveForm.date, type: moveForm.type, partId: moveForm.partId, partName: part.name, qty: Number(moveForm.qty), note: moveForm.note, ref: moveForm.type + "-" + today() };
    update("parts", newParts);
    update("stockMovements", [...data.stockMovements, movement]);
    showToast(`Đã ${moveForm.type} kho thành công`);
    setMoveForm({ partId: "", type: "Nhập", qty: 1, note: "", date: today() });
    setModal(null);
  };

  const tabs = [
    { id: "inventory", label: "📦 Tồn kho" },
    { id: "movements", label: "📋 Xuất nhập kho" },
    { id: "lowstock", label: `⚠️ Sắp hết (${data.parts.filter(p => p.stock <= p.minStock).length})` }
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", gap: 0, background: "#fff", borderRadius: 10, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ flex: 1, padding: "12px", border: "none", background: tab === t.id ? "#1a237e" : "transparent", color: tab === t.id ? "#fff" : "#666", fontWeight: tab === t.id ? 700 : 400, cursor: "pointer", fontSize: 13, transition: "all .15s" }}>
            {t.label}
          </button>
        ))}
      </div>

      {tab === "inventory" && (
        <>
          <Card>
            <div style={{ display: "flex", gap: 10, justifyContent: "space-between", alignItems: "center" }}>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Tìm mã, tên vật tư..."
                style={{ padding: "7px 12px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13, width: 260 }} />
              <div style={{ display: "flex", gap: 8 }}>
                <Btn outline color="#1565c0" onClick={() => printInventory(filtered)}>🖨️ In tồn kho</Btn>
                <Btn outline onClick={() => setModal("move")}>📤 Xuất / Nhập kho</Btn>
                <Btn onClick={openNew}>➕ Thêm vật tư</Btn>
              </div>
            </div>
          </Card>
          <Card>
            <Table
              headers={!can("see_cost_price")
                ? ["Mã", "Tên vật tư", "Nhóm", "ĐV", "Giá bán", "Tồn kho", "Vị trí", "Thao tác"]
                : ["Mã", "Tên vật tư", "Nhóm", "ĐV", "Giá vốn", "Giá bán", "Tồn kho", "Vị trí", "Thao tác"]}
              rows={filtered.map(p => !can("see_cost_price")
                ? [
                    <span style={{ fontFamily: "monospace", fontWeight: 700, color: "#1a237e" }}>{p.code}</span>,
                    p.name, p.category, p.unit,
                    formatCurrency(p.salePrice),
                    <span style={{ fontWeight: 700, color: p.stock <= p.minStock ? "#c62828" : "#2e7d32" }}>{p.stock} {p.unit} {p.stock <= p.minStock ? "⚠️" : ""}</span>,
                    p.location || "-",
                    <div style={{ display: "flex", gap: 4 }}>
                      <Btn size="sm" onClick={() => openEdit(p)} outline>✏️</Btn>
                      <Btn size="sm" onClick={() => del(p.id)} color="#c62828" outline>🗑️</Btn>
                    </div>
                  ]
                : [
                    <span style={{ fontFamily: "monospace", fontWeight: 700, color: "#1a237e" }}>{p.code}</span>,
                    p.name, p.category, p.unit,
                    formatCurrency(p.costPrice), formatCurrency(p.salePrice),
                    <span style={{ fontWeight: 700, color: p.stock <= p.minStock ? "#c62828" : "#2e7d32" }}>{p.stock} {p.unit} {p.stock <= p.minStock ? "⚠️" : ""}</span>,
                    p.location || "-",
                    <div style={{ display: "flex", gap: 4 }}>
                      <Btn size="sm" onClick={() => openEdit(p)} outline>✏️</Btn>
                      <Btn size="sm" onClick={() => del(p.id)} color="#c62828" outline>🗑️</Btn>
                    </div>
                  ]
              )}
            />
          </Card>
        </>
      )}

      {tab === "movements" && (
        <Card>
          <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 10 }}>
            <Btn size="sm" outline color="#1565c0" onClick={() => printStockMovements(data.stockMovements||[])}>🖨️ In lịch sử kho</Btn>
          </div>
          <Table
            headers={["Ngày", "Loại", "Vật tư", "Số lượng", "Chứng từ", "Ghi chú"]}
            rows={(data.stockMovements || []).slice().reverse().map(m => [
              formatDate(m.date),
              <Badge label={m.type} color={m.type === "Nhập" ? "#2e7d32" : "#f57c00"} />,
              m.partName, m.qty, m.ref || "-", m.note || "-"
            ])}
            emptyMsg="Chưa có giao dịch kho"
          />
        </Card>
      )}

      {tab === "lowstock" && (
        <Card>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ color: "#c62828", fontWeight: 700 }}>⚠️ Các vật tư có tồn kho dưới mức tối thiểu</div>
            <Btn size="sm" outline color="#c62828" onClick={() => printLowStock(data.parts)}>🖨️ In danh sách</Btn>
          </div>
          <Table
            headers={["Mã", "Tên vật tư", "Tồn hiện tại", "Tồn tối thiểu", "Cần nhập thêm"]}
            rows={data.parts.filter(p => p.stock <= p.minStock).map(p => [
              p.code, p.name,
              <span style={{ color: "#c62828", fontWeight: 700 }}>{p.stock} {p.unit}</span>,
              `${p.minStock} ${p.unit}`,
              <span style={{ color: "#f57c00", fontWeight: 700 }}>{Math.max(0, p.minStock * 2 - p.stock)} {p.unit}</span>
            ])}
            emptyMsg="Kho đủ hàng ✅"
          />
        </Card>
      )}

      {modal === "part" && (
        <Modal title={data.parts.find(p => p.id === form.id) ? "Cập nhật vật tư" : "Thêm vật tư"} onClose={() => setModal(null)}>
          <Grid cols={2} gap={12}>
            <Input label="Mã vật tư" value={form.code} onChange={v => setForm({ ...form, code: v })} required />
            <Input label="Tên vật tư" value={form.name} onChange={v => setForm({ ...form, name: v })} required />
            <Input label="Nhóm / Danh mục" value={form.category} onChange={v => setForm({ ...form, category: v })} />
            <Input label="Đơn vị tính" value={form.unit} onChange={v => setForm({ ...form, unit: v })} />
            {can("see_cost_price") && <Input label="Giá vốn (đ)" value={form.costPrice} onChange={v => setForm({ ...form, costPrice: v })} type="number" />}
            <Input label="Giá bán (đ)" value={form.salePrice} onChange={v => setForm({ ...form, salePrice: v })} type="number" />
            <Input label="Tồn kho hiện tại" value={form.stock} onChange={v => setForm({ ...form, stock: v })} type="number" />
            <Input label="Tồn kho tối thiểu" value={form.minStock} onChange={v => setForm({ ...form, minStock: v })} type="number" />
            <Input label="Vị trí lưu kho" value={form.location} onChange={v => setForm({ ...form, location: v })} style={{ gridColumn: "span 2" }} />
          </Grid>
          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 16 }}>
