// ===================== ACCOUNTING PAGE =====================
function AccountingPage({ data }) {
  const [period, setPeriod] = useState("month");
  const now = new Date();
  const filterByPeriod = (r) => {
    const d = new Date(r.receiveDate || r.date);
    if (period === "today") return (r.receiveDate || r.date) === today();
    if (period === "month") return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if (period === "year") return d.getFullYear() === now.getFullYear();
    return true;
  };

  const orders = data.repairOrders.filter(filterByPeriod);
  const completed = orders.filter(r => r.status === "Hoàn thành" || r.status === "Đã xuất xưởng");
  const revenue = completed.reduce((s, r) => s + (Number(r.totalAmount) || 0), 0);
  const labor = completed.reduce((s, r) => s + (Number(r.totalLabor) || 0), 0);
  const partsRev = completed.reduce((s, r) => s + (Number(r.totalParts) || 0), 0);
  const partsCost = completed.reduce((s, r) => {
    const pts = r.parts || [];
    return s + pts.reduce((ps, pt) => {
      const p = data.parts.find(p => p.id === pt.partId);
      return ps + (p ? p.costPrice * pt.qty : 0);
    }, 0);
  }, 0);
  const discount = completed.reduce((s, r) => s + (Number(r.discount) || 0), 0);
  const paid = completed.reduce((s, r) => s + (Number(r.paid) || 0), 0);
  const debt = completed.reduce((s, r) => s + (Number(r.totalAmount) - Number(r.paid)), 0);
  const stockValue = data.parts.reduce((s, p) => s + p.costPrice * p.stock, 0);

  // ---- Liên kết với BÁO GIÁ: mọi hạng mục báo giá đã duyệt trong kỳ ----
  const allQuotesInPeriod = (data.quotes || []).filter(filterByPeriod);
  const quotesInPeriod = allQuotesInPeriod.filter(q => q.status === "Đã duyệt");
  const quoteRevenue = quotesInPeriod.reduce((s, q) => s + (Number(q.total) || 0), 0);
  const quoteCost    = quotesInPeriod.reduce((s, q) => s + (Number(q.totalCost) || 0), 0);
  const quoteProfit  = quotesInPeriod.reduce((s, q) => s + (Number(q.grossProfit) || 0), 0);
  const quoteLabor   = quotesInPeriod.reduce((s, q) => s + (q.items || []).filter(it => it.type === "labor").reduce((ss, it) => ss + Number(it.hours) * Number(it.laborRate), 0), 0);
  const quotePartsRev = quoteRevenue - quoteLabor;
  // Đếm theo hạng mục (vật tư/công) trên mọi báo giá đã duyệt trong kỳ — để liên kết Chi phí vận hành & Kho
  const quotePartItemsByPart = {};
  quotesInPeriod.forEach(q => (q.items || []).forEach(it => {
    if (it.type === "labor") return;
    const key = it.partId || it.name;
    if (!quotePartItemsByPart[key]) quotePartItemsByPart[key] = { name: it.name, qty: 0, cost: 0, rev: 0 };
    quotePartItemsByPart[key].qty += Number(it.qty) || 0;
    quotePartItemsByPart[key].cost += Number(it.qty) * Number(it.costPrice) || 0;
    quotePartItemsByPart[key].rev += Number(it.qty) * Number(it.salePrice) || 0;
  }));

  // Operating costs from salary records + operating expenses
  const salaryRecordsInPeriod = (data.salaryRecords || []).filter(sr => {
    if (period === "all") return true;
    const d = new Date(sr.month + "-01");
    if (period === "today") return false;
    if (period === "month") return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    if (period === "year") return d.getFullYear() === now.getFullYear();
    return true;
  });
  const totalSalaryPaid = salaryRecordsInPeriod.reduce((s, sr) => s + (Number(sr.netSalary) || 0), 0);
  const totalBHXHCompany = salaryRecordsInPeriod.reduce((s, sr) => s + (Number(sr.bhxhCompany) || 0) + (Number(sr.bhytCompany) || 0) + (Number(sr.bhtnCompany) || 0), 0);
  const opExpenses = (data.operatingExpenses || []).filter(filterByPeriod);
  const totalOpExp = opExpenses.reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const totalCosts = partsCost + totalSalaryPaid + totalBHXHCompany + totalOpExp;
  const netProfit = revenue - totalCosts;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <Card>
        <div style={{ display: "flex", gap: 10, alignItems: "center", justifyContent: "space-between", flexWrap: "wrap" }}>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <div style={{ fontWeight: 700, color: "#1a237e" }}>Kỳ báo cáo:</div>
            {[["today", "Hôm nay"], ["month", "Tháng này"], ["year", "Năm nay"], ["all", "Tất cả"]].map(([v, l]) => (
              <button key={v} onClick={() => setPeriod(v)}
                style={{ padding: "6px 16px", border: `2px solid ${period === v ? "#1a237e" : "#ddd"}`, borderRadius: 20, background: period === v ? "#1a237e" : "#fff", color: period === v ? "#fff" : "#666", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>
                {l}
              </button>
            ))}
          </div>
          <Btn outline color="#1565c0" onClick={() => printPnL({ period, revenue, labor, partsRev, discount, partsCost, totalSalaryPaid, totalBHXHCompany, totalOpExp, totalCosts, netProfit, completed: completed.length, paid, debt, orders, data })}>🖨️ In báo cáo kế toán</Btn>
        </div>
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14 }}>
        <StatCard label="Tổng doanh thu" value={formatCurrency(revenue)} icon="💰" color="#2e7d32" sub={`${completed.length} lệnh hoàn thành`} />
        <StatCard label="Lợi nhuận ròng" value={formatCurrency(netProfit)} icon="📈" color={netProfit >= 0 ? "#1a237e" : "#c62828"} sub="Sau tất cả chi phí" />
        <StatCard label="Đã thu" value={formatCurrency(paid)} icon="✅" color="#1565c0" />
        <StatCard label="Công nợ còn lại" value={formatCurrency(Math.max(0, debt))} icon="⚠️" color={debt > 0 ? "#c62828" : "#2e7d32"} />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Card>
          <div style={{ fontWeight: 700, color: "#1a237e", marginBottom: 12, fontSize: 15 }}>📊 Báo cáo lãi lỗ (P&L)</div>
          {[
            { label: "Doanh thu lệnh sửa chữa", val: revenue, color: "#2e7d32", indent: 0 },
            { label: "  — Tiền công lao động", val: labor, color: "#1565c0", indent: 1 },
            { label: "  — Doanh thu vật tư SC", val: partsRev, color: "#1565c0", indent: 1 },
            { label: "  — Chiết khấu SC", val: -discount, color: "#f57c00", indent: 1 },
            { label: "Doanh thu báo giá đã duyệt", val: quoteRevenue, color: "#2e7d32", indent: 0 },
            { label: "  — Giá vốn VT (báo giá)", val: -quoteCost, color: "#e65100", indent: 1 },
            { label: "  — Lãi báo giá", val: quoteProfit, color: "#1565c0", indent: 1 },
            { label: "Giá vốn vật tư (lệnh SC)", val: -partsCost, color: "#c62828", indent: 0 },
            { label: "Chi phí lương nhân viên", val: -totalSalaryPaid, color: "#c62828", indent: 0 },
            { label: "BHXH công ty đóng", val: -totalBHXHCompany, color: "#c62828", indent: 0 },
            { label: "Chi phí vận hành khác", val: -totalOpExp, color: "#c62828", indent: 0 },
            { label: "LỢI NHUẬN RÒNG", val: revenue + quoteRevenue - partsCost - quoteCost - totalSalaryPaid - totalBHXHCompany - totalOpExp, color: (revenue + quoteRevenue - partsCost - quoteCost - totalSalaryPaid - totalBHXHCompany - totalOpExp) >= 0 ? "#1a237e" : "#c62828", indent: 0, bold: true },
          ].map((item, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: i < 8 ? "1px solid #f5f5f5" : "2px solid #1a237e", paddingLeft: item.indent ? 16 : 0 }}>
              <span style={{ fontSize: item.bold ? 14 : 13, color: item.indent ? "#777" : "#333", fontWeight: item.bold ? 800 : 500 }}>{item.label}</span>
              <span style={{ fontWeight: item.bold ? 800 : 700, color: item.color, fontSize: item.bold ? 16 : 14 }}>{formatCurrency(item.val)}</span>
            </div>
          ))}
        </Card>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <Card>
            <div style={{ fontWeight: 700, color: "#1a237e", marginBottom: 12, fontSize: 15 }}>👥 Chi phí nhân sự trong kỳ</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {[
                { label: "Lương net đã chi", val: totalSalaryPaid, color: "#c62828", bg: "#ffebee" },
                { label: "BHXH/BHYT/BHTN (công ty)", val: totalBHXHCompany, color: "#c62828", bg: "#ffebee" },
                { label: "Tổng chi nhân sự", val: totalSalaryPaid + totalBHXHCompany, color: "#7b1fa2", bg: "#f3e5f5", bold: true },
              ].map((item, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "9px 12px", background: item.bg, borderRadius: 8 }}>
                  <span style={{ fontSize: 13, fontWeight: item.bold ? 700 : 500 }}>{item.label}</span>
                  <span style={{ fontWeight: 800, color: item.color }}>{formatCurrency(item.val)}</span>
                </div>
              ))}
            </div>
          </Card>
          <Card>
            <div style={{ fontWeight: 700, color: "#1a237e", marginBottom: 12, fontSize: 15 }}>🏭 Kho hàng & Chi phí khác</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {[
                { label: "Giá trị tồn kho", val: stockValue, color: "#2e7d32", bg: "#e8f5e9" },
                { label: "Chi phí vận hành khác", val: totalOpExp, color: "#f57c00", bg: "#fff3e0" },
                { label: "SKU vật tư sắp hết", val: `${data.parts.filter(p => p.stock <= p.minStock).length} mặt hàng`, color: "#c62828", bg: "#ffebee", isText: true },
              ].map((item, i) => (
                <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "9px 12px", background: item.bg, borderRadius: 8 }}>
                  <span style={{ fontSize: 13 }}>{item.label}</span>
                  <span style={{ fontWeight: 800, color: item.color }}>{item.isText ? item.val : formatCurrency(item.val)}</span>
                </div>
              ))}
            </div>
          </Card>
        </div>
      </div>

      <Card>
        <div style={{ fontWeight: 700, color: "#1a237e", marginBottom: 12, fontSize: 15 }}>🧾 Lệnh sửa chữa trong kỳ</div>
        <Table
          headers={["Mã LSC", "Ngày", "Xe", "Khách hàng", "Tiền công", "Tiền VT", "CK", "Tổng", "Đã thu", "Trạng thái"]}

            const v = data.vehicles.find(v => v.id === r.vehicleId);

              formatCurrency(r.paid), <StatusBadge status={r.status} />

          })}
          emptyMsg="Không có dữ liệu trong kỳ"
        />
      </Card>

      {/* ===== LIÊN KẾT BÁO GIÁ → KẾ TOÁN ===== */}

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>

              <span style={{ fontWeight: 700, color: (it.rev - it.cost) >= 0 ? "#1565c0" : "#c62828" }}>{formatCurrency(it.rev - it.cost)}</span>,
            ])}
          />
        )}
      </Card>
    </div>
  );
}

// BHXH rates Vietnam 2026: Employee: BHXH 8%, BHYT 1.5%, BHTN 1% = 10.5%
//                          Company:  BHXH 17.5%, BHYT 3%, BHTN 1% = 21.5%
const BHXH_EMP = { bhxh: 8, bhyt: 1.5, bhtn: 1 };
const BHXH_CO  = { bhxh: 17.5, bhyt: 3, bhtn: 1 };
const calcSalary = (staff, bonus = 0, deduct = 0, workDays = 26) => {
  const base = Number(staff.basicSalary) || 0;
  const allowance = Number(staff.allowance) || 0;
  const grossBase = base * (workDays / 26); // pro-rate by days
  const bhxhEmp = grossBase * (BHXH_EMP.bhxh + BHXH_EMP.bhyt + BHXH_EMP.bhtn) / 100;
  const bhxhCo  = grossBase * (BHXH_CO.bhxh + BHXH_CO.bhyt + BHXH_CO.bhtn) / 100;
  const bhytCo  = 0; // already in bhxhCo combined
  const bhtnCo  = 0;
  const gross = grossBase + allowance + Number(bonus);
  const net = gross - bhxhEmp - Number(deduct);
  const bhxhCoAmt = grossBase * BHXH_CO.bhxh / 100;
  const bhytCoAmt = grossBase * BHXH_CO.bhyt / 100;
  const bhtnCoAmt = grossBase * BHXH_CO.bhtn / 100;
  const bhxhEmpAmt = grossBase * BHXH_EMP.bhxh / 100;
  const bhytEmpAmt = grossBase * BHXH_EMP.bhyt / 100;
  const bhtnEmpAmt = grossBase * BHXH_EMP.bhtn / 100;
  return { grossBase, allowance, bonus: Number(bonus), deduct: Number(deduct), gross, bhxhEmpAmt, bhytEmpAmt, bhtnEmpAmt, bhxhEmp, net, bhxhCoAmt, bhytCoAmt, bhtnCoAmt, bhxhCo: bhxhCoAmt + bhytCoAmt + bhtnCoAmt };
};

                {(data.staffs || []).filter(s => s.status === "active").map((staff, i) => {

                      <td style={{ padding: "6px 8px" }}>

                      <td style={{ padding: "6px 8px" }}>

                      </td>
                      <td style={{ padding: "8px 10px" }}>{formatCurrency(staff.basicSalary)}</td>
                      <td style={{ padding: "8px 10px", fontWeight: 700 }}>{formatCurrency(calc.gross)}</td>
                      <td style={{ padding: "8px 10px", color: "#c62828" }}>{formatCurrency(calc.bhxhEmp)}</td>

              </tbody>
              <tfoot>
                <tr style={{ background: "#e8eaf6", fontWeight: 800 }}>
                  <td colSpan={5} style={{ padding: "10px", color: "#1a237e" }}>TỔNG CỘNG</td>
                  <td style={{ padding: "10px" }}>{formatCurrency((data.staffs||[]).filter(s=>s.status==="active").reduce((s,st)=>{ const c=calcSalary(st,Number((salaryData[st.id]||{}).bonus||0),Number((salaryData[st.id]||{}).deduct||0),Number((salaryData[st.id]||{}).workDays||26)); return s+c.gross; },0))}</td>
                  <td style={{ padding: "10px", color: "#c62828" }}>{formatCurrency((data.staffs||[]).filter(s=>s.status==="active").reduce((s,st)=>{ const c=calcSalary(st,Number((salaryData[st.id]||{}).bonus||0),Number((salaryData[st.id]||{}).deduct||0),Number((salaryData[st.id]||{}).workDays||26)); return s+c.bhxhEmp; },0))}</td>
                  <td style={{ padding: "10px", color: "#2e7d32", fontSize: 14 }}>{formatCurrency((data.staffs||[]).filter(s=>s.status==="active").reduce((s,st)=>{ const c=calcSalary(st,Number((salaryData[st.id]||{}).bonus||0),Number((salaryData[st.id]||{}).deduct||0),Number((salaryData[st.id]||{}).workDays||26)); return s+c.net; },0))}</td>
                  <td style={{ padding: "10px", color: "#7b1fa2" }}>{formatCurrency((data.staffs||[]).filter(s=>s.status==="active").reduce((s,st)=>{ const c=calcSalary(st,Number((salaryData[st.id]||{}).bonus||0),Number((salaryData[st.id]||{}).deduct||0),Number((salaryData[st.id]||{}).workDays||26)); return s+c.bhxhCo; },0))}</td>
                  <td style={{ padding: "10px", color: "#c62828", fontSize: 14 }}>{formatCurrency((data.staffs||[]).filter(s=>s.status==="active").reduce((s,st)=>{ const c=calcSalary(st,Number((salaryData[st.id]||{}).bonus||0),Number((salaryData[st.id]||{}).deduct||0),Number((salaryData[st.id]||{}).workDays||26)); return s+c.gross+c.bhxhCo; },0))}</td>

          <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 16 }}>

// ===================== REPORTS PAGE =====================
function ReportsPage({ data }) {
  const revenue = data.repairOrders
    .filter(r => r.status === "Hoàn thành" || r.status === "Đã xuất xưởng")
    .reduce((s, r) => s + (Number(r.totalAmount) || 0), 0);

  const byStatus = {};
  data.repairOrders.forEach(r => { byStatus[r.status] = (byStatus[r.status] || 0) + 1; });

  const byTech = data.technicians.map(t => ({
    name: t.name,
    count: data.repairOrders.filter(r => r.technicianId === t.id).length,
    done: data.repairOrders.filter(r => r.technicianId === t.id && (r.status === "Hoàn thành" || r.status === "Đã xuất xưởng")).length,
    rev: data.repairOrders.filter(r => r.technicianId === t.id && (r.status === "Hoàn thành" || r.status === "Đã xuất xưởng")).reduce((s, r) => s + (Number(r.totalAmount) || 0), 0)
  }));

  const waiting = data.repairOrders.filter(r => r.status !== "Đã xuất xưởng" && r.status !== "Hoàn thành" && r.status !== "Huỷ");

  const approvedQts = (data.quotes || []).filter(q => q.status === "Đã duyệt");
  const totalQtRev  = approvedQts.reduce((s, q) => s + (Number(q.total) || 0), 0);
  const totalQtCost = approvedQts.reduce((s, q) => s + (Number(q.totalCost) || 0), 0);
  const totalQtProfit = approvedQts.reduce((s, q) => s + (Number(q.grossProfit) || 0), 0);

  // ---- Liên kết: Báo giá theo trạng thái ----
  const byQuoteStatus = {};
  (data.quotes || []).forEach(q => { byQuoteStatus[q.status] = (byQuoteStatus[q.status] || 0) + 1; });

  // ---- Liên kết: Top khách hàng theo doanh thu báo giá ----
  const custQuoteRev = {};
  approvedQts.forEach(q => {
    const c = data.customers.find(c => c.id === q.customerId);
    const key = c?.id || "unknown";
    if (!custQuoteRev[key]) custQuoteRev[key] = { name: c?.name || "Không rõ", count: 0, rev: 0 };
    custQuoteRev[key].count += 1;
    custQuoteRev[key].rev += Number(q.total) || 0;
  });
  const topCustomers = Object.values(custQuoteRev).sort((a, b) => b.rev - a.rev).slice(0, 8);

  // ---- Liên kết: Top vật tư bán chạy qua báo giá ----
  const partSales = {};
  approvedQts.forEach(q => (q.items || []).forEach(it => {
    if (it.type === "labor") return;
    const key = it.partId || it.name;
    if (!partSales[key]) partSales[key] = { name: it.name, qty: 0, rev: 0 };
    partSales[key].qty += Number(it.qty) || 0;
    partSales[key].rev += Number(it.qty) * Number(it.salePrice) || 0;
  }));
  const topParts = Object.values(partSales).sort((a, b) => b.rev - a.rev).slice(0, 8);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", justifyContent: "flex-end" }}>
        <Btn outline color="#1565c0" onClick={() => printReports(data, byStatus, byTech, waiting, revenue)}>🖨️ In báo cáo tổng hợp</Btn>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 14 }}>
        <StatCard label="Tổng lệnh SC" value={data.repairOrders.length} icon="🔧" color="#1a237e" />
        <StatCard label="Xe trong kho" value={waiting.length} icon="🚗" color="#f57c00" sub="Đang sửa / chờ" />
        <StatCard label="Tổng khách hàng" value={data.customers.length} icon="👤" color="#2e7d32" />
        <StatCard label="Doanh thu lệnh SC" value={formatCurrency(revenue)} icon="💰" color="#1565c0" />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14 }}>
        <StatCard label="Báo giá đã duyệt" value={approvedQts.length} icon="🧾" color="#7b1fa2" sub={"/ " + (data.quotes||[]).length + " tổng"} />
        <StatCard label="Doanh thu từ báo giá" value={formatCurrency(totalQtRev)} icon="📋" color="#2e7d32" />
        <StatCard label="Lãi ước tính báo giá" value={formatCurrency(totalQtProfit)} icon="📈" color={totalQtProfit >= 0 ? "#1565c0" : "#c62828"} />
      </div>

      {/* ===== LIÊN KẾT BÁO GIÁ: trạng thái + top khách hàng + top vật tư ===== */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
        <Card>
          <div style={{ fontWeight: 700, color: "#6a1b9a", marginBottom: 12 }}>🧾 Báo giá theo trạng thái</div>
          {Object.keys(byQuoteStatus).length === 0 ? (
            <div style={{ textAlign: "center", padding: 12, color: "#aaa" }}>Chưa có báo giá</div>
          ) : Object.entries(byQuoteStatus).map(([s, n]) => (
            <div key={s} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: "1px solid #f5f5f5" }}>
              <Badge label={s} color={s==="Đã duyệt"?"#2e7d32":s==="Huỷ"?"#c62828":"#f57c00"} />
              <span style={{ fontWeight: 700 }}>{n}</span>
            </div>
          ))}
        </Card>

        <Card>
          <div style={{ fontWeight: 700, color: "#1565c0", marginBottom: 12 }}>👤 Top khách hàng (theo BG)</div>
          {topCustomers.length === 0 ? (
            <div style={{ textAlign: "center", padding: 12, color: "#aaa" }}>Chưa có dữ liệu</div>
          ) : topCustomers.map((c, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #f5f5f5" }}>
              <div><span style={{ fontWeight: 700, fontSize: 12 }}>{c.name}</span><div style={{ fontSize: 10, color: "#888" }}>{c.count} báo giá</div></div>
              <span style={{ fontWeight: 700, color: "#2e7d32", fontSize: 12 }}>{formatCurrency(c.rev)}</span>
            </div>
          ))}
        </Card>

        <Card>
          <div style={{ fontWeight: 700, color: "#e65100", marginBottom: 12 }}>🔩 Top vật tư bán chạy (qua BG)</div>
          {topParts.length === 0 ? (
            <div style={{ textAlign: "center", padding: 12, color: "#aaa" }}>Chưa có dữ liệu</div>
          ) : topParts.map((p, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: "1px solid #f5f5f5" }}>
              <div><span style={{ fontWeight: 700, fontSize: 12 }}>{p.name}</span><div style={{ fontSize: 10, color: "#888" }}>SL: {p.qty}</div></div>
              <span style={{ fontWeight: 700, color: "#2e7d32", fontSize: 12 }}>{formatCurrency(p.rev)}</span>
            </div>
          ))}
        </Card>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <Card>
          <div style={{ fontWeight: 700, color: "#1a237e", marginBottom: 12 }}>📊 Lệnh SC theo trạng thái</div>
          {Object.entries(byStatus).map(([s, n]) => (
            <div key={s} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid #f5f5f5" }}>
              <StatusBadge status={s} />
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 120, height: 8, background: "#eee", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ width: `${(n / data.repairOrders.length * 100)}%`, height: "100%", background: "#1a237e", borderRadius: 4 }} />
                </div>
                <span style={{ fontWeight: 700 }}>{n}</span>
              </div>
            </div>
          ))}
        </Card>

        <Card>
          <div style={{ fontWeight: 700, color: "#1a237e", marginBottom: 12 }}>👨‍🔧 Hiệu suất kỹ thuật viên</div>
          <Table
            headers={["KTV", "Tổng lệnh", "Hoàn thành", "Doanh thu"]}
            rows={byTech.map(t => [
              <span style={{ fontWeight: 700 }}>{t.name}</span>,
              t.count, t.done,
              <span style={{ fontWeight: 700, color: "#2e7d32" }}>{formatCurrency(t.rev)}</span>
            ])}
            emptyMsg="Chưa có dữ liệu"
          />
        </Card>
      </div>

      <Card>
        <div style={{ fontWeight: 700, color: "#f57c00", marginBottom: 12, fontSize: 15 }}>🚗 Xe tồn trong garage</div>
        <Table
          headers={["Biển số", "Tên xe", "Khách hàng", "Ngày tiếp nhận", "Triệu chứng", "KTV phụ trách", "Trạng thái"]}
          rows={waiting.map(r => {
            const v = data.vehicles.find(v => v.id === r.vehicleId);
            const c = data.customers.find(c => c.id === r.customerId);
            const t = data.technicians.find(t => t.id === r.technicianId);
            const days = Math.ceil((new Date() - new Date(r.receiveDate)) / 86400000);
            return [
              <span style={{ fontWeight: 700, color: "#1a237e" }}>{v?.licensePlate || "-"}</span>,
              v?.vehicleName || "-", c?.name || "-",
              <span>{formatDate(r.receiveDate)} <span style={{ color: days > 3 ? "#c62828" : "#2e7d32", fontSize: 11 }}>({days} ngày)</span></span>,
              r.symptoms.slice(0, 40), t?.name || "-",
              <StatusBadge status={r.status} />
            ];
          })}
          emptyMsg="Không có xe nào đang trong garage ✅"
        />
      </Card>

      <Card>
        <div style={{ fontWeight: 700, color: "#2e7d32", marginBottom: 12, fontSize: 15 }}>🚪 Xe đã xuất xưởng</div>
        <Table
          headers={["Biển số", "Tên xe", "Khách hàng", "Ngày xuất", "Tổng thanh toán", "Đã thu"]}
          rows={data.repairOrders.filter(r => r.status === "Đã xuất xưởng").map(r => {
            const v = data.vehicles.find(v => v.id === r.vehicleId);
            const c = data.customers.find(c => c.id === r.customerId);
            return [
              <span style={{ fontWeight: 700 }}>{v?.licensePlate || "-"}</span>,
              v?.vehicleName || "-", c?.name || "-",
              formatDate(r.actualDone || r.receiveDate),
              <span style={{ fontWeight: 700, color: "#2e7d32" }}>{formatCurrency(r.totalAmount)}</span>,
              formatCurrency(r.paid)
            ];
          })}
          emptyMsg="Chưa có xe xuất xưởng"
        />
      </Card>
    </div>
  );
}

// ===================== PERMISSIONS PAGE =====================
const AVATAR_OPTIONS = ["👔","📋","💰","👨‍🔧","👩‍💼","🧑‍💻","🛠️","📊","🔑","👷"];
const EMPTY_SYS_USER = { id: null, username: "", password: "", name: "", avatar: "📋", role: "staff", active: true, pages: ["dashboard"], sensitive: [], note: "" };

function PermissionsPage({ data, update, showToast, currentUser }) {
  const [tab, setTab]         = useState("users");
  const [modal, setModal]     = useState(null);   // "new" | "edit" | "perm"
  const [form, setForm]       = useState({ ...EMPTY_SYS_USER });
  const [selUser, setSelUser] = useState(null);   // user đang phân quyền
  const [showPw, setShowPw]   = useState(false);
  const [permDraft, setPermDraft] = useState({ pages: [], sensitive: [] });

  const sysUsers = data.sysUsers && data.sysUsers.length > 0 ? data.sysUsers : DEFAULT_USERS;

  // ---- Quản lý tài khoản ----
  const openNew = () => {
    setForm({ ...EMPTY_SYS_USER, id: generateId(), pages: ["dashboard"] });
    setShowPw(false);
    setModal("new");
  };
  const openEdit = (u) => {
    if (u.role === "admin" && u.id !== currentUser.id) { showToast("Không thể sửa tài khoản admin khác", "error"); return; }
    setForm({ ...u });
    setShowPw(false);
    setModal("edit");
  };
  const saveUser = () => {
    if (!form.username || !form.name) return showToast("Nhập tên đăng nhập và tên hiển thị", "error");
    if (modal === "new" && !form.password) return showToast("Nhập mật khẩu", "error");
    const exists = sysUsers.find(u => u.id === form.id);
    const dup = sysUsers.find(u => u.username === form.username && u.id !== form.id);
    if (dup) return showToast("Tên đăng nhập đã tồn tại", "error");
    const saved = { ...form };
    if (modal === "new") saved.id = generateId();
    const updated = exists ? sysUsers.map(u => u.id === saved.id ? saved : u) : [...sysUsers, saved];
    update("sysUsers", updated);
    showToast(exists ? "Đã cập nhật tài khoản" : "Đã tạo tài khoản mới");
    setModal(null);
  };
  const toggleActive = (u) => {
    if (u.role === "admin") return showToast("Không thể khóa tài khoản admin", "error");
    const updated = sysUsers.map(x => x.id === u.id ? { ...x, active: !x.active } : x);
    update("sysUsers", updated);
    showToast(u.active ? `Đã khóa tài khoản ${u.name}` : `Đã mở khóa ${u.name}`);
  };
  const delUser = (u) => {
    if (u.role === "admin") return showToast("Không thể xóa tài khoản admin", "error");
    if (!window.confirm(`Xóa tài khoản "${u.name}"?`)) return;
    update("sysUsers", sysUsers.filter(x => x.id !== u.id));
    showToast("Đã xóa tài khoản");
  };

  // ---- Phân quyền ----
  const openPerm = (u) => {
    if (u.role === "admin") return showToast("Admin luôn có toàn quyền, không thể thay đổi", "error");
    setSelUser(u);
    setPermDraft({ pages: [...(u.pages || [])], sensitive: [...(u.sensitive || [])] });
    setModal("perm");
  };
  const togglePage = (pageId) => {
    if (pageId === "dashboard") return; // dashboard luôn bật
    setPermDraft(d => ({
      ...d,
      pages: d.pages.includes(pageId) ? d.pages.filter(p => p !== pageId) : [...d.pages, pageId]
    }));
  };
  const toggleSensitive = (sid) => {
    setPermDraft(d => ({
      ...d,
      sensitive: d.sensitive.includes(sid) ? d.sensitive.filter(s => s !== sid) : [...d.sensitive, sid]
    }));
  };
  const savePerm = () => {
    const updated = sysUsers.map(u => u.id === selUser.id ? { ...u, pages: permDraft.pages, sensitive: permDraft.sensitive } : u);
    update("sysUsers", updated);
    showToast(`Đã lưu phân quyền cho ${selUser.name}`);
    setModal(null);
  };

  // ---- Sao lưu & Khôi phục dữ liệu ----
  const fileInputRef = React.useRef(null);
  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g, "-");
    a.href = url;
    a.download = `sico-auto-backup-${stamp}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Đã tải file sao lưu dữ liệu");
  };
  const triggerImport = () => fileInputRef.current?.click();
  const importData = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed || typeof parsed !== "object" || !Array.isArray(parsed.customers)) {
          showToast("File không đúng định dạng dữ liệu SICO AUTO", "error");
          return;
        }
        if (!window.confirm("Khôi phục sẽ THAY THẾ TOÀN BỘ dữ liệu hiện tại bằng dữ liệu trong file. Bạn chắc chắn muốn tiếp tục?")) return;
        Object.keys(parsed).forEach(key => update(key, parsed[key]));
        showToast("Đã khôi phục dữ liệu từ file sao lưu");
      } catch (err) {
        showToast("Không đọc được file — file có thể bị hỏng hoặc sai định dạng JSON", "error");
      } finally {
        e.target.value = "";
      }
    };
    reader.readAsText(file);
  };

  // ---- GROUP pages theo nhóm ----
  const pageGroups = {};
  ALL_PAGES.filter(p => p.id !== "permissions").forEach(p => {
    if (!pageGroups[p.group]) pageGroups[p.group] = [];
    pageGroups[p.group].push(p);
  });

  const tabs = [
    { id: "users", label: "👥 Danh sách tài khoản" },
    { id: "perm_overview", label: "🗂️ Tổng quan phân quyền" },
    { id: "backup", label: "💾 Sao lưu & Khôi phục" },
  ];

  const nonAdminUsers = sysUsers.filter(u => u.role !== "admin");

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>

      {/* Header cảnh báo */}
      <div style={{ background: "linear-gradient(90deg,#1a237e,#1565c0)", color: "#fff", borderRadius: 10, padding: "14px 20px", display: "flex", alignItems: "center", gap: 14 }}>
        <span style={{ fontSize: 32 }}>🔑</span>
        <div>
          <div style={{ fontWeight: 800, fontSize: 15 }}>Quản lý phân quyền hệ thống</div>
          <div style={{ fontSize: 12, color: "#90caf9", marginTop: 2 }}>Chỉ tài khoản <strong>Admin</strong> mới truy cập được trang này. Thay đổi quyền sẽ có hiệu lực ngay sau lần đăng nhập tiếp theo của nhân viên.</div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 0, background: "#fff", borderRadius: 10, overflow: "hidden", boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ flex: 1, padding: "12px", border: "none", background: tab === t.id ? "#1a237e" : "transparent", color: tab === t.id ? "#fff" : "#666", fontWeight: tab === t.id ? 700 : 400, cursor: "pointer", fontSize: 13, transition: "all .15s" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ===== TAB: DANH SÁCH TÀI KHOẢN ===== */}
      {tab === "users" && (<>
        <div style={{ background: "#fff", borderRadius: 10, padding: "14px 20px", boxShadow: "0 1px 4px rgba(0,0,0,0.08)", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ fontWeight: 700, color: "#1a237e" }}>Tài khoản hệ thống ({sysUsers.length})</div>
          <button onClick={openNew} style={{ padding: "8px 16px", background: "#1a237e", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 13 }}>➕ Thêm tài khoản</button>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {sysUsers.map(u => (
            <div key={u.id} style={{ background: "#fff", borderRadius: 10, padding: "14px 20px", boxShadow: "0 1px 4px rgba(0,0,0,0.08)", border: u.role === "admin" ? "2px solid #1a237e" : u.active === false ? "2px solid #ffcdd2" : "2px solid transparent", opacity: u.active === false ? 0.75 : 1 }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                {/* Avatar + info */}
                <div style={{ fontSize: 36, width: 48, textAlign: "center", flexShrink: 0 }}>{u.avatar}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <span style={{ fontWeight: 800, fontSize: 15, color: "#1a237e" }}>{u.name}</span>
                    {u.role === "admin"
                      ? <span style={{ background: "#1a237e", color: "#fff", fontSize: 11, fontWeight: 700, padding: "2px 10px", borderRadius: 20 }}>👑 ADMIN</span>
                      : <span style={{ background: "#e3f2fd", color: "#1565c0", fontSize: 11, fontWeight: 700, padding: "2px 10px", borderRadius: 20 }}>Nhân viên</span>
                    }
                    {u.active === false && <span style={{ background: "#ffebee", color: "#c62828", fontSize: 11, fontWeight: 700, padding: "2px 10px", borderRadius: 20 }}>🔒 Bị khóa</span>}
                  </div>
                  <div style={{ fontSize: 12, color: "#666", marginTop: 3 }}>@{u.username} · {u.note || "—"}</div>
                  {/* Trang được phép */}
                  <div style={{ marginTop: 8, display: "flex", flexWrap: "wrap", gap: 4 }}>
                    {(u.role === "admin" ? ADMIN_PAGES : (u.pages || [])).map(pid => {
                      const pg = ALL_PAGES.find(p => p.id === pid);
                      return pg ? <span key={pid} style={{ background: "#e8eaf6", color: "#1a237e", fontSize: 11, padding: "2px 8px", borderRadius: 12, fontWeight: 600 }}>{pg.icon} {pg.label}</span> : null;
                    })}
                  </div>
                  {/* Quyền nhạy cảm */}
                  {(u.role === "admin" ? ADMIN_SENSITIVE : (u.sensitive || [])).length > 0 && (
                    <div style={{ marginTop: 5, display: "flex", flexWrap: "wrap", gap: 4 }}>
                      {(u.role === "admin" ? ADMIN_SENSITIVE : u.sensitive).map(sid => {
                        const s = ALL_SENSITIVE.find(x => x.id === sid);
                        return s ? <span key={sid} style={{ background: "#fff8e1", color: "#e65100", fontSize: 11, padding: "2px 8px", borderRadius: 12, fontWeight: 600 }}>{s.icon} {s.label}</span> : null;
                      })}
                    </div>
                  )}
                </div>
                {/* Actions */}
                <div style={{ display: "flex", flexDirection: "column", gap: 6, flexShrink: 0 }}>
                  {u.role !== "admin" && (
                    <button onClick={() => openPerm(u)} style={{ padding: "6px 12px", background: "#e8eaf6", color: "#1a237e", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 12 }}>🔑 Phân quyền</button>
                  )}
                  <button onClick={() => openEdit(u)} style={{ padding: "6px 12px", background: "#e3f2fd", color: "#1565c0", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 12 }}>✏️ Sửa</button>
                  {u.role !== "admin" && (<>
                    <button onClick={() => toggleActive(u)} style={{ padding: "6px 12px", background: u.active === false ? "#e8f5e9" : "#fff8e1", color: u.active === false ? "#2e7d32" : "#e65100", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 12 }}>
                      {u.active === false ? "🔓 Mở khóa" : "🔒 Khóa"}
                    </button>
                    <button onClick={() => delUser(u)} style={{ padding: "6px 12px", background: "#ffebee", color: "#c62828", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 12 }}>🗑️ Xóa</button>
                  </>)}
                </div>
              </div>
            </div>
          ))}
        </div>
      </>)}

      {/* ===== TAB: TỔNG QUAN PHÂN QUYỀN ===== */}
      {tab === "perm_overview" && (
        <div style={{ background: "#fff", borderRadius: 10, padding: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.08)", overflowX: "auto" }}>
          <div style={{ fontWeight: 700, color: "#1a237e", marginBottom: 14, fontSize: 14 }}>Ma trận phân quyền toàn hệ thống</div>
          <table style={{ borderCollapse: "collapse", fontSize: 12, minWidth: 700 }}>
            <thead>
              <tr style={{ background: "#e8eaf6" }}>
                <th style={{ padding: "8px 12px", textAlign: "left", color: "#1a237e", minWidth: 150 }}>Trang / Quyền</th>
                {sysUsers.map(u => (
                  <th key={u.id} style={{ padding: "8px 10px", textAlign: "center", color: "#1a237e", minWidth: 100 }}>
                    <div style={{ fontSize: 18 }}>{u.avatar}</div>
                    <div style={{ fontWeight: 700, fontSize: 11 }}>{u.name}</div>
                    {u.role === "admin" && <div style={{ fontSize: 10, color: "#1565c0" }}>Admin</div>}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {/* Pages section */}
              <tr><td colSpan={sysUsers.length + 1} style={{ padding: "8px 12px", fontWeight: 800, background: "#f5f5f5", color: "#333", fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>📂 Trang truy cập</td></tr>
              {ALL_PAGES.map((pg, i) => (
                <tr key={pg.id} style={{ borderBottom: "1px solid #f5f5f5", background: i % 2 === 0 ? "#fff" : "#fafafa" }}>
                  <td style={{ padding: "7px 12px", color: "#333" }}>{pg.icon} {pg.label}</td>
                  {sysUsers.map(u => {
                    const has = u.role === "admin" ? true : (u.pages || []).includes(pg.id);
                    return (
                      <td key={u.id} style={{ padding: "7px 10px", textAlign: "center" }}>
                        <span style={{ fontSize: 16 }}>{has ? "✅" : "⬜"}</span>
                      </td>
                    );
                  })}
                </tr>
              ))}
              {/* Sensitive section */}
              <tr><td colSpan={sysUsers.length + 1} style={{ padding: "8px 12px", fontWeight: 800, background: "#fff3e0", color: "#e65100", fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>🔐 Dữ liệu nhạy cảm</td></tr>
              {ALL_SENSITIVE.map((s, i) => (
                <tr key={s.id} style={{ borderBottom: "1px solid #f5f5f5", background: i % 2 === 0 ? "#fffde7" : "#fff8e1" }}>
                  <td style={{ padding: "7px 12px", color: "#e65100" }}>{s.icon} {s.label}</td>
                  {sysUsers.map(u => {
                    const has = u.role === "admin" ? true : (u.sensitive || []).includes(s.id);
                    return (
                      <td key={u.id} style={{ padding: "7px 10px", textAlign: "center" }}>
                        <span style={{ fontSize: 16 }}>{has ? "✅" : "⬜"}</span>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* ===== TAB: SAO LƯU & KHÔI PHỤC ===== */}
      {tab === "backup" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ background: "#fff3e0", borderRadius: 10, padding: "14px 20px", fontSize: 13, color: "#e65100", lineHeight: 1.6 }}>
            ⚠️ Dữ liệu của hệ thống hiện đang lưu trong trình duyệt (sessionStorage) — sẽ <strong>mất khi đóng tab/trình duyệt</strong>, hoặc không xuất hiện nếu mở ở máy/trình duyệt khác.
            Hãy <strong>tải file sao lưu thường xuyên</strong>, đặc biệt trước khi đóng trình duyệt hoặc trước khi cập nhật phần mềm lên phiên bản mới.
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
            <div style={{ background: "#fff", borderRadius: 10, padding: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>📤</div>
              <div style={{ fontWeight: 700, color: "#1a237e", fontSize: 15, marginBottom: 6 }}>Tải file sao lưu</div>
              <div style={{ fontSize: 12, color: "#666", marginBottom: 14, lineHeight: 1.5 }}>
                Xuất toàn bộ dữ liệu hiện tại (khách hàng, xe, báo giá, lệnh sửa chữa, vật tư, nhân sự, lương, chi phí, tài khoản...) ra 1 file JSON để lưu trữ.
              </div>
              <button onClick={exportData} style={{ width: "100%", padding: "10px", background: "#1a237e", color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontWeight: 700, fontSize: 13 }}>
                📤 Tải file sao lưu (.json)
              </button>
            </div>

            <div style={{ background: "#fff", borderRadius: 10, padding: 20, boxShadow: "0 1px 4px rgba(0,0,0,0.08)" }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>📥</div>
              <div style={{ fontWeight: 700, color: "#1a237e", fontSize: 15, marginBottom: 6 }}>Khôi phục từ file</div>
              <div style={{ fontSize: 12, color: "#666", marginBottom: 14, lineHeight: 1.5 }}>
                Chọn lại file .json đã tải trước đó để khôi phục dữ liệu. <strong style={{ color: "#c62828" }}>Sẽ thay thế toàn bộ dữ liệu hiện tại.</strong>
              </div>
              <input ref={fileInputRef} type="file" accept=".json,application/json" onChange={importData} style={{ display: "none" }} />
              <button onClick={triggerImport} style={{ width: "100%", padding: "10px", background: "#fff", color: "#1a237e", border: "2px solid #1a237e", borderRadius: 8, cursor: "pointer", fontWeight: 700, fontSize: 13 }}>
                📥 Chọn file để khôi phục
              </button>
            </div>
          </div>

          <div style={{ background: "#e8f5e9", borderRadius: 10, padding: "14px 20px", fontSize: 12, color: "#2e7d32", lineHeight: 1.6 }}>
            💡 <strong>Khi nào nên sao lưu:</strong> trước khi đóng trình duyệt cuối ngày làm việc, trước khi cập nhật phần mềm lên phiên bản mới, hoặc định kỳ hàng tuần để phòng rủi ro.
            File sao lưu có thể lưu vào USB, email cho chính mình, hoặc Google Drive để an toàn hơn.
          </div>
        </div>
      )}

      {/* ===== MODAL: THÊM / SỬA TÀI KHOẢN ===== */}
      {(modal === "new" || modal === "edit") && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <div style={{ background: "#fff", borderRadius: 12, width: "100%", maxWidth: 520, boxShadow: "0 8px 40px rgba(0,0,0,0.25)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px", borderBottom: "1px solid #eee" }}>
              <div style={{ fontWeight: 700, fontSize: 16, color: "#1a237e" }}>{modal === "new" ? "➕ Tạo tài khoản mới" : "✏️ Sửa tài khoản"}</div>
              <button onClick={() => setModal(null)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#666" }}>✕</button>
            </div>
            <div style={{ padding: 20, display: "flex", flexDirection: "column", gap: 14 }}>
              {/* Avatar picker */}
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#555", marginBottom: 6 }}>Avatar</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {AVATAR_OPTIONS.map(a => (
                    <button key={a} onClick={() => setForm(f => ({ ...f, avatar: a }))}
                      style={{ fontSize: 22, padding: "6px 8px", border: form.avatar === a ? "2px solid #1a237e" : "2px solid #e0e0e0", borderRadius: 8, background: form.avatar === a ? "#e8eaf6" : "#fff", cursor: "pointer" }}>{a}</button>
                  ))}
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: "#555", display: "block", marginBottom: 4 }}>Tên hiển thị *</label>
                  <input value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="VD: Nhân viên A"
                    style={{ width: "100%", padding: "8px 10px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13, boxSizing: "border-box" }} />
                </div>
                <div>
                  <label style={{ fontSize: 12, fontWeight: 700, color: "#555", display: "block", marginBottom: 4 }}>Tên đăng nhập *</label>
                  <input value={form.username} onChange={e => setForm(f => ({ ...f, username: e.target.value }))} placeholder="VD: nhanvien_a"
                    style={{ width: "100%", padding: "8px 10px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13, boxSizing: "border-box" }} />
                </div>
              </div>
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: "#555", display: "block", marginBottom: 4 }}>
                  Mật khẩu {modal === "edit" && <span style={{ fontWeight: 400, color: "#aaa" }}>(để trống = giữ nguyên)</span>}
                </label>
                <div style={{ position: "relative" }}>
                  <input type={showPw ? "text" : "password"} value={form.password} onChange={e => setForm(f => ({ ...f, password: e.target.value }))} placeholder={modal === "edit" ? "Nhập để đổi mật khẩu" : "Nhập mật khẩu *"}
                    style={{ width: "100%", padding: "8px 36px 8px 10px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13, boxSizing: "border-box" }} />
                  <button onClick={() => setShowPw(v => !v)} style={{ position: "absolute", right: 8, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", fontSize: 15 }}>{showPw ? "🙈" : "👁️"}</button>
                </div>
              </div>
              <div>
                <label style={{ fontSize: 12, fontWeight: 700, color: "#555", display: "block", marginBottom: 4 }}>Ghi chú / mô tả vai trò</label>
                <input value={form.note || ""} onChange={e => setForm(f => ({ ...f, note: e.target.value }))} placeholder="VD: Phụ trách báo giá, không xem giá nhập"
                  style={{ width: "100%", padding: "8px 10px", border: "1px solid #ddd", borderRadius: 6, fontSize: 13, boxSizing: "border-box" }} />
              </div>
              {form.role !== "admin" && (
                <div style={{ background: "#fff8e1", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#e65100" }}>
                  💡 Sau khi tạo, vào <strong>🔑 Phân quyền</strong> để tick trang và quyền cho tài khoản này.
                </div>
              )}
              <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 4 }}>
                <button onClick={() => setModal(null)} style={{ padding: "9px 18px", background: "transparent", border: "2px solid #aaa", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 13, color: "#666" }}>Huỷ</button>
                <button onClick={saveUser} style={{ padding: "9px 18px", background: "#1a237e", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 13 }}>💾 Lưu</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ===== MODAL: PHÂN QUYỀN ===== */}
      {modal === "perm" && selUser && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.45)", zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
          <div style={{ background: "#fff", borderRadius: 12, width: "100%", maxWidth: 700, maxHeight: "92vh", overflow: "auto", boxShadow: "0 8px 40px rgba(0,0,0,0.25)" }}>
            <div style={{ position: "sticky", top: 0, background: "#fff", zIndex: 1, display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 20px", borderBottom: "1px solid #eee" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 16, color: "#1a237e" }}>🔑 Phân quyền cho: {selUser.avatar} {selUser.name}</div>
                <div style={{ fontSize: 12, color: "#888", marginTop: 2 }}>@{selUser.username} · {selUser.note || "Nhân viên"}</div>
              </div>
              <button onClick={() => setModal(null)} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: "#666" }}>✕</button>
            </div>
            <div style={{ padding: 20 }}>

              {/* PHẦN 1: TRANG TRUY CẬP */}
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontWeight: 800, color: "#1a237e", fontSize: 13, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ background: "#e8eaf6", padding: "4px 10px", borderRadius: 6 }}>📂 Trang được phép truy cập</span>
                </div>
                {Object.entries(pageGroups).map(([group, pages]) => (
                  <div key={group} style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#888", textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>{group}</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {pages.map(pg => {
                        const checked = permDraft.pages.includes(pg.id);
                        const locked = pg.id === "dashboard";
                        return (
                          <div key={pg.id} onClick={() => !locked && togglePage(pg.id)}
                            style={{ display: "flex", alignItems: "center", gap: 7, padding: "8px 14px", borderRadius: 8, cursor: locked ? "default" : "pointer", border: checked ? "2px solid #1a237e" : "2px solid #e0e0e0", background: checked ? "#e8eaf6" : "#fafafa", transition: "all .15s", opacity: locked ? 0.7 : 1 }}>
                            <span style={{ fontSize: 18 }}>{pg.icon}</span>
                            <span style={{ fontSize: 13, fontWeight: checked ? 700 : 400, color: checked ? "#1a237e" : "#555" }}>{pg.label}</span>
                            {locked && <span style={{ fontSize: 10, color: "#aaa" }}>bắt buộc</span>}
                            {checked && !locked && <span style={{ color: "#2e7d32", fontWeight: 700 }}>✓</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>

              {/* PHẦN 2: QUYỀN DỮ LIỆU NHẠY CẢM */}
              <div style={{ borderTop: "1px solid #f0f0f0", paddingTop: 16 }}>
                <div style={{ fontWeight: 800, color: "#e65100", fontSize: 13, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ background: "#fff3e0", padding: "4px 10px", borderRadius: 6 }}>🔐 Quyền xem dữ liệu nhạy cảm</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {ALL_SENSITIVE.map(s => {
                    const checked = permDraft.sensitive.includes(s.id);
                    return (
                      <div key={s.id} onClick={() => toggleSensitive(s.id)}
                        style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "10px 14px", borderRadius: 8, cursor: "pointer", border: checked ? "2px solid #e65100" : "2px solid #e0e0e0", background: checked ? "#fff8e1" : "#fafafa", transition: "all .15s" }}>
                        <div style={{ fontSize: 20, marginTop: 1 }}>{s.icon}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: checked ? 700 : 600, color: checked ? "#e65100" : "#555", fontSize: 13 }}>{s.label}</div>
                          <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{s.desc}</div>
                        </div>
                        <div style={{ width: 22, height: 22, borderRadius: 4, border: checked ? "none" : "2px solid #ccc", background: checked ? "#e65100" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 2 }}>
                          {checked && <span style={{ color: "#fff", fontSize: 14, fontWeight: 900 }}>✓</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              <div style={{ display: "flex", gap: 10, justifyContent: "flex-end", marginTop: 20 }}>
                <button onClick={() => setModal(null)} style={{ padding: "9px 18px", background: "transparent", border: "2px solid #aaa", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 13, color: "#666" }}>Huỷ</button>
                <button onClick={savePerm} style={{ padding: "9px 18px", background: "#1a237e", color: "#fff", border: "none", borderRadius: 6, cursor: "pointer", fontWeight: 700, fontSize: 13 }}>💾 Lưu phân quyền</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ===================== ALERTS PAGE =====================
function AlertsPage({ data, alerts, setPage }) {
  const allVehicles = data.vehicles.map(v => {
    const cust = data.customers.find(c => c.id === v.customerId);
    const regDays = daysUntil(v.registrationExpiry);
    const insDays = daysUntil(v.insuranceExpiry);
    const maintKm = v.nextMaintenanceKm ? (Number(v.nextMaintenanceKm) - Number(v.currentKm)) : null;
    return { ...v, cust, regDays, insDays, maintKm };
  }).sort((a, b) => (a.regDays || 999) - (b.regDays || 999));

  const alertColor = (days) => {
    if (days === null) return "#aaa";
    if (days < 0) return "#c62828";
    if (days <= 15) return "#c62828";
    if (days <= 30) return "#f57c00";
    return "#2e7d32";
  };
  const alertText = (days, label) => {
    if (days === null) return `Chưa nhập ${label}`;
    if (days < 0) return `Đã hết hạn ${Math.abs(days)} ngày`;
    if (days === 0) return `Hết hạn HÔM NAY ⚠️`;
    return `Còn ${days} ngày`;
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "flex-end" }}>
        <Btn outline color="#1565c0" onClick={() => printAlerts(allVehicles)}>🖨️ In danh sách nhắc nhở</Btn>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 14 }}>
        <StatCard label="Đăng kiểm đã hết hạn" value={allVehicles.filter(v => v.regDays !== null && v.regDays < 0).length} icon="❌" color="#c62828" />
        <StatCard label="Đăng kiểm trong 30 ngày" value={allVehicles.filter(v => v.regDays !== null && v.regDays >= 0 && v.regDays <= 30).length} icon="⚠️" color="#f57c00" />
        <StatCard label="Bảo hiểm đã hết hạn" value={allVehicles.filter(v => v.insDays !== null && v.insDays < 0).length} icon="❌" color="#c62828" />
      </div>

      <Card>
        <div style={{ fontWeight: 700, color: "#1a237e", marginBottom: 12, fontSize: 15 }}>🔔 Trạng thái hạn xe toàn hệ thống</div>
        <Table
          headers={["Biển số", "Tên xe", "Khách hàng", "SĐT", "Đăng kiểm", "Bảo hiểm", "Km bảo dưỡng còn lại"]}
          rows={allVehicles.map(v => [
            <span style={{ fontWeight: 800, color: "#1a237e" }}>{v.licensePlate}</span>,
            v.vehicleName,
            v.cust?.name || "-",
            v.cust?.phone || "-",
            <div>
              <div style={{ fontSize: 11, color: "#666" }}>{formatDate(v.registrationExpiry)}</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: alertColor(v.regDays) }}>{alertText(v.regDays, "đăng kiểm")}</div>
            </div>,
            <div>
              <div style={{ fontSize: 11, color: "#666" }}>{formatDate(v.insuranceExpiry)}</div>
              <div style={{ fontSize: 12, fontWeight: 700, color: alertColor(v.insDays) }}>{alertText(v.insDays, "bảo hiểm")}</div>
            </div>,
            v.maintKm !== null
              ? <span style={{ color: v.maintKm <= 1000 ? "#c62828" : v.maintKm <= 5000 ? "#f57c00" : "#2e7d32", fontWeight: 700 }}>
                {v.maintKm <= 0 ? "Quá hạn!" : `${Number(v.maintKm).toLocaleString()} km`}
              </span>
              : <span style={{ color: "#aaa" }}>Chưa thiết lập</span>
          ])}
          emptyMsg="Không có xe nào"
        />
      </Card>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<SicoAuto />);
</script>
</body>
